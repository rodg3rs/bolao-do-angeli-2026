<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de E-mail - Bolão</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; text-align: center; width: 320px; border: 1px solid #4CAF50; box-shadow: 0 10px 30px rgba(0,255,0,0.1); }
        h2 { color: #4CAF50; margin-top: 0; }
        p { color: #888; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #222; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #4CAF50; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .enviar { background: #4CAF50; color: white; margin-bottom: 10px; }
        .enviar:hover { background: #45a049; transform: scale(1.02); }
        .sair { background: transparent; color: #f44336; border: 1px solid #f44336; text-decoration: none; display: block; line-height: 2.5; }
        .sair:hover { background: #f44336; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📧 Notificador</h2>
        <p>Envie o ranking atual para os amigos</p>
        <form action="/enviar-ranking" method="POST">
            <input type="email" name="destinatario" placeholder="E-mail do amigo" required>
            <button type="submit" class="btn enviar">ENVIAR AGORA</button>
        </form>
        <a href="/" class="btn sair">SAIR</a>
    </div>
</body>
</html>
