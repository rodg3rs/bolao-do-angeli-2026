<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bolão do Angeli 2026</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #ffc107; --border: #334155; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: grid; grid-template-columns: 220px 1fr 650px; grid-template-rows: 80px 1fr; }
        header { grid-column: 1 / -1; background: var(--panel); display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border); z-index: 10; }
        header h1 { font-size: 26px; font-weight: bold; color: white; letter-spacing: 2px; text-transform: uppercase; }
        .sidebar-l { background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .menu-btn { padding: 12px 15px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; color: #94a3b8; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .menu-btn:hover, .menu-btn.active { background: var(--border); color: white; }
        .spacer { flex-grow: 1; }
        main { padding: 20px; background: var(--bg); border-right: 1px solid var(--border); display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; }
        .sidebar-r { background: #162033; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .widget-box { background: #0f172a; border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .empty-state { color: #334155; font-style: italic; margin-top: 50px; }
    </style>
</head>
<body>
    <header><h1>BOLÃO DO ANGELI - 2026</h1></header>
    <aside class="sidebar-l">
        <div class="menu-btn" id="btn-login" onclick="carregarSecao('login.html')">👤 Login / Cadastro</div>
        <div class="menu-btn" id="btn-palpites" onclick="carregarSecao('palpites.html')">⚽ Meus Palpites</div>
        <div class="spacer"></div>
        <div class="menu-btn" style="color:#ef4444;" onclick="location.reload()">🚪 Sair</div>
    </aside>
    <main id="conteudo-central"><div class="empty-state">Selecione uma opção...</div></main>
    <aside class="sidebar-r">
        <div class="widget-box">🏆 Ranking</div>
        <div class="widget-box">💬 Chat</div>
    </aside>

    <script>
        let usuarioLogado = null; // Variável global para controle de sessão

        async function carregarSecao(arquivo) {
            const main = document.getElementById('conteudo-central');
            try {
                const response = await fetch(arquivo);
                const html = await response.text();
                main.innerHTML = html;
                
                // Remove classe active de todos e coloca no clicado
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                // Tenta marcar o botão correto se houver ID
            } catch (e) {
                main.innerHTML = "<p>Erro ao carregar seção.</p>";
            }
        }
    </script>
</body>
</html>
