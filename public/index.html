<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bolão do Angeli 2026</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #ffc107; --border: #334155; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            display: grid; 
            /* Colunas: Menu(220px), Centro(Flex), Ranking(300px), Chat(300px) */
            grid-template-columns: 220px 1fr 300px 300px; 
            grid-template-rows: 80px 1fr; 
        }
        
        header { 
            grid-column: 1 / -1; 
            background: var(--panel); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        header h1 { font-size: 26px; font-weight: bold; color: white; letter-spacing: 2px; text-transform: uppercase; }
        
        #user-display {
            font-size: 14px;
            color: var(--accent);
            margin-top: 5px;
            font-weight: 600;
        }

        /* Menu Lateral Esquerdo */
        .sidebar-l { 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
        }
        .menu-btn { 
            padding: 12px 15px; 
            margin-bottom: 8px; 
            border-radius: 8px; 
            cursor: pointer; 
            color: #94a3b8; 
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-btn:hover, .menu-btn.active { background: var(--border); color: white; }
        .menu-btn.active { border-left: 4px solid var(--accent); border-radius: 4px 8px 8px 4px; }

        /* Área Central (Iframe ou Conteúdo) */
        main { padding: 30px; overflow-y: auto; display: flex; justify-content: center; align-items: center; }
        .content-area { width: 100%; height: 100%; max-width: 900px; display: flex; justify-content: center; align-items: center;}

        /* Coluna do Ranking */
        .sidebar-r { background: #162033; padding: 15px; border-left: 1px solid var(--border); }
        
        /* Coluna do Chat */
        .sidebar-chat { background: #1a2438; padding: 15px; border-left: 1px solid var(--border); }

        /* Widgets (Caixas de conteúdo lateral) */
        .widget { 
            background: var(--bg); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
        }
        .widget-title { 
            color: var(--accent); 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            text-align: center; 
            margin-bottom: 12px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 8px; 
        }
        .list-scroll { flex-grow: 1; overflow-y: auto; }
        
        /* Estilo das mensagens do chat */
        .chat-msg { margin-bottom: 8px; font-size: 0.85rem; line-height: 1.4; }
        .chat-msg b { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>BOLÃO DO ANGELI - 2026</h1>
        <div id="user-display">Visitante</div>
    </header>

    <aside class="sidebar-l">
        <div class="menu-btn active" onclick="abrirAuth()">🔑 Entrar / Cadastrar</div>
        <div class="menu-btn" style="opacity: 0.5; cursor: not-allowed;">⚽ Meus Palpites</div>
        <div class="menu-btn" style="opacity: 0.5; cursor: not-allowed;">👥 Galera</div>
        <div class="menu-btn" style="opacity: 0.5; cursor: not-allowed;">📜 Regulamento</div>
        <div style="flex-grow: 1;"></div>
        <div class="menu-btn" style="color: #ef4444;" onclick="alert('Você já está deslogado!')">🚪 Sair</div>
    </aside>

    <main>
        <div class="content-area" id="conteudo-principal">
            <iframe src="login.html" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </main>

    <aside class="sidebar-r">
        <div class="widget">
            <div class="widget-title">🏆 Ranking Geral</div>
            <div id="lista-ranking" class="list-scroll">
                </div>
        </div>
    </aside>

    <aside class="sidebar-chat">
        <div class="widget">
            <div class="widget-title">💬 Zoação (24h)</div>
            <div id="chat-box" class="list-scroll">
                </div>
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <input type="text" id="chat-input" placeholder="Digite algo..." 
                       style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: white;">
                <button onclick="enviarMensagem()" style="background: var(--success); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Enviar</button>
            </div>
        </div>
    </aside>

    <script>
        // --- 1. FUNÇÃO DO RANKING ---
        async function carregarRanking() {
            try {
                const res = await fetch('/api/ranking');
                const data = await res.json();
                
                if(data.success && data.ranking) {
                    let html = '';
                    data.ranking.forEach((user, index) => {
                        html += `
                            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border); font-size: 0.9rem;">
                                <span><b>${index + 1}º</b> ${user.Apelido}</span>
                                <b style="color: var(--accent);">${user.Total || 0} pts</b>
                            </div>
                        `;
                    });
                    const container = document.getElementById('lista-ranking');
                    if (container) container.innerHTML = html;
                }
            } catch(e) {
                console.error("Erro ao carregar ranking:", e);
            }
        }

        // --- 2. FUNÇÕES DO CHAT ---
        async function carregarChat() {
            try {
                const res = await fetch('/get-chat');
                const data = await res.json();
                
                if (data.success && data.mensagens) {
                    let html = '';
                    data.mensagens.forEach(m => {
                        html += `
                            <div class="chat-msg">
                                <b>${m.Apelido}:</b> ${m.Mensagem}
                            </div>
                        `;
                    });
                    const container = document.getElementById('chat-box');
                    if (container) {
                        container.innerHTML = html;
                        container.scrollTop = container.scrollHeight; // Rola o chat para a última mensagem
                    }
                }
            } catch(e) {
                console.error("Erro ao carregar chat:", e);
            }
        }

        async function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const mensagem = input.value.trim();
            const apelido = document.getElementById('user-display').innerText;

            if (!mensagem) return;

            if (apelido === "Visitante") {
                alert("Você precisa estar logado para enviar mensagens!");
                return;
            }

            try {
                const res = await fetch('/enviar-msg', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apelido, mensagem })
                });

                const data = await res.json();
                if (data.success) {
                    input.value = '';
                    carregarChat();
                }
            } catch(e) {
                console.error("Erro ao enviar mensagem:", e);
            }
        }

        // Enviar mensagem ao apertar Enter
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                enviarMensagem();
            }
        });

        // --- 3. INICIALIZAÇÃO E LOOPS (Varredura) ---
        document.addEventListener('DOMContentLoaded', () => {
            // Carrega os dados assim que o site abre
            carregarRanking();
            carregarChat();
            
            // Loop para atualizar o Ranking a cada 10 segundos
            setInterval(carregarRanking, 10000);

            // Loop para atualizar o Chat a cada 3 segundos
            setInterval(carregarChat, 3000);
        });

        // --- 4. FUNÇÕES DE NAVEGAÇÃO ---
        function abrirAuth() {
            document.getElementById('conteudo-principal').innerHTML = '<iframe src="login.html" style="width:100%; height:100%; border:none;"></iframe>';
        }

        // Função escutada pelo iframe (login.html) quando o usuário loga
        window.definirUsuario = function(usuario) {
            document.getElementById('user-display').innerText = usuario.apelido;
            location.href = `dashboard.html?id=${usuario.id}&apelido=${usuario.apelido}`;
        };
    </script>
</body>
</html>
