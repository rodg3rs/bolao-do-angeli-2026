<div style="background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; border: 1px solid #334155;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;">
        <h2 id="p-titulo">Meus Palpites</h2>
        <button style="background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;" onclick="limparCentro()">Fechar</button>
    </div>
    <div id="p-lista">Carregando...</div>
</div>

<script>
    (async function carregarApostas() {
        if(!usuarioLogado) {
            document.getElementById('p-lista').innerHTML = "Faça login primeiro!";
            return;
        }
        document.getElementById('p-titulo').innerText = "Meus Palpites: " + usuarioLogado.Apelido;
        const res = await fetch(`/minhas-apostas/${usuarioLogado.Apelido}`);
        const data = await res.json();
        
        let html = '<table style="width:100%; border-collapse: collapse;">';
        data.apostas.forEach(j => {
            html += `
                <tr style="border-bottom: 1px solid #334155;">
                    <td style="padding:12px; font-size:0.7rem;">${j.Data}<br>${j.Horario}</td>
                    <td align="right">${j.Sel1} <input type="number" value="${j.Ap1}" style="width:45px; background:#0f172a; color:#ffc107; border:1px solid #334155; text-align:center;" onchange="salvar('${j.Jogo}', this.value, 'ap1')"></td>
                    <td align="center">X</td>
                    <td><input type="number" value="${j.Ap2}" style="width:45px; background:#0f172a; color:#ffc107; border:1px solid #334155; text-align:center;" onchange="salvar('${j.Jogo}', this.value, 'ap2')"> ${j.Sel2}</td>
                </tr>`;
        });
        document.getElementById('p-lista').innerHTML = html + "</table>";
    })();

    async function salvar(jogo, valor, tipo) {
        // Lógica de salvar simplificada aqui para o exemplo modular
        alert("Salvando palpite para " + jogo);
    }
</script>
