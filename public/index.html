<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bolão do Angeli 2026</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #ffc107; --border: #334155; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            display: grid; 
            /* Colunas Ajustadas: Lateral esquerda 220px, Centro Flexível, Laterais Direitas 300px cada */
            grid-template-columns: 220px 1fr 300px 300px; 
            grid-template-rows: 80px 1fr; 
        }
        
        header { 
            grid-column: 1 / -1; 
            background: var(--panel); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        header h1 { font-size: 26px; font-weight: bold; color: white; letter-spacing: 2px; text-transform: uppercase; }
        #user-display { font-size: 0.9rem; color: var(--accent); margin-top: 5px; font-weight: 500; }

        .sidebar-l { 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
        }
        .menu-label { color: #64748b; font-size: 0.75rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .menu-btn { padding: 12px 15px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; color: #94a3b8; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: none; background: transparent; width: 100%; text-align: left; font-size: 1rem; }
        .menu-btn:hover, .menu-btn.active { background: var(--border); color: white; }
        .spacer { flex-grow: 1; }

        main { 
            padding: 20px; 
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        /* Estilo dos Cards de Conteúdo Central */
        .content-card { background: var(--panel); padding: 25px; border-radius: 12px; width: 100%; max-width: 900px; border: 1px solid var(--border); position: relative; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Laterais Direitas (Widgets) */
        .widget-col { background: #162033; padding: 15px; display: flex; flex-direction: column; gap: 15px; border-left: 1px solid var(--border); }
        .widget-box { flex: 1; display: flex; flex-direction: column; background: #0f172a; border-radius: 12px; padding: 15px; border: 1px solid var(--border); overflow: hidden; }
        .widget-title { color: var(--accent); font-weight: bold; margin-bottom: 15px; font-size: 0.85rem; text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        .list-scroll { overflow-y: auto; flex-grow: 1; font-size: 0.85rem; color: #94a3b8; text-align: center; }
        .empty-state { color: #334155; font-style: italic; font-size: 1.1rem; text-align: center; margin-top: 50px; width: 100%; }

        /* Formulários */
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
        .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #94a3b8; font-weight: bold; transition: 0.3s; }
        .auth-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .auth-form { display: flex; flex-direction: column; gap: 12px; }
        .auth-form input { padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: white; outline: none; }
        .auth-form button { padding: 12px; border-radius: 6px; border: none; background: var(--accent); color: black; font-weight: bold; cursor: pointer; }
        .btn-reg { background: var(--success) !important; color: white !important; }
    </style>
</head>
<body>

    <header>
        <h1>BOLÃO DO ANGELI - 2026</h1>
        <div id="user-display">Visitante</div>
    </header>

    <aside class="sidebar-l">
        <div class="menu-label">Menu Principal</div>
        <button class="menu-btn" id="btn-login" onclick="abrirLogin()">👤 Login</button>
        <button class="menu-btn" id="btn-palpites" onclick="abrirPalpites()">⚽ Meus Palpites</button>
        <button class="menu-btn" onclick="limparCentro()">👥 Galera</button>
        <button class="menu-btn" onclick="limparCentro()">📜 Regulamento</button>
        <button class="menu-btn" onclick="limparCentro()">⚙️ Admin</button>
        <div class="spacer"></div>
        <button class="menu-btn" style="color:#ef4444; border: 1px solid #ef444433; justify-content: center; font-weight: bold;" onclick="location.reload()">🚪 Sair</button>
    </aside>

    <main id="conteudo-central">
        <div class="empty-state">Selecione uma opção no menu lateral...</div>
    </main>

    <div class="widget-col">
        <div class="widget-box">
            <div class="widget-title">🏆 Ranking Geral</div>
            <div class="list-scroll">Faça login para ver</div>
        </div>
    </div>

    <div class="widget-col">
        <div class="widget-box">
            <div class="widget-title">💬 Zoação (24h)</div>
            <div class="list-scroll">Faça login para ver</div>
            <input type="text" style="width: 100%; padding: 8px; margin-top: 10px; background: var(--panel); border: 1px solid var(--border); color: white; border-radius: 4px;" placeholder="Zoe aqui...">
        </div>
    </div>

<script>
    let usuarioLogado = null;

    function limparCentro() {
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('conteudo-central').innerHTML = '<div class="empty-state">Selecione uma opção no menu lateral...</div>';
    }

    function atualizarCabecalho() {
        const display = document.getElementById('user-display');
        display.innerText = usuarioLogado ? `Logado como: ${usuarioLogado.Apelido}` : "Visitante";
    }

    function abrirLogin() {
        limparCentro();
        document.getElementById('btn-login').classList.add('active');
        document.getElementById('conteudo-central').innerHTML = `
            <div class="content-card" style="max-width: 400px;">
                <div class="auth-tabs">
                    <div id="t-entrar" class="auth-tab active" onclick="guiaAuth('entrar')">Entrar</div>
                    <div id="t-cadastrar" class="auth-tab" onclick="guiaAuth('cadastrar')">Cadastrar</div>
                </div>
                <div id="f-entrar">
                    <form class="auth-form" onsubmit="login(event)">
                        <input type="text" id="l-apelido" placeholder="Seu Apelido" required>
                        <input type="password" id="l-senha" placeholder="Sua Senha" required>
                        <button type="submit">Acessar Conta</button>
                    </form>
                </div>
                <div id="f-cadastrar" style="display:none;">
                    <form class="auth-form" onsubmit="cadastro(event)">
                        <input type="text" id="r-voucher" placeholder="Voucher Admin" required>
                        <input type="text" id="r-apelido" placeholder="Apelido no Ranking" required>
                        <input type="password" id="r-senha" placeholder="Senha (6 dígitos)" required minlength="6" maxlength="6">
                        <button type="submit" class="btn-reg">Criar Minha Conta</button>
                    </form>
                </div>
            </div>`;
    }

    function guiaAuth(tipo) {
        document.getElementById('f-entrar').style.display = tipo === 'entrar' ? 'block' : 'none';
        document.getElementById('f-cadastrar').style.display = tipo === 'entrar' ? 'none' : 'block';
        document.getElementById('t-entrar').classList.toggle('active', tipo === 'entrar');
        document.getElementById('t-cadastrar').classList.toggle('active', tipo === 'cadastrar');
    }

    async function login(e) {
        e.preventDefault();
        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    apelido: document.getElementById('l-apelido').value, 
                    senha: document.getElementById('l-senha').value 
                })
            });
            const data = await res.json();
            if(data.success) {
                usuarioLogado = data.user;
                atualizarCabecalho();
                limparCentro();
            } else alert(data.message);
        } catch (err) { alert("Erro ao conectar com servidor."); }
    }

    function abrirPalpites() {
        if(!usuarioLogado) return alert("Acesse sua conta primeiro!");
        limparCentro();
        document.getElementById('btn-palpites').classList.add('active');
        document.getElementById('conteudo-central').innerHTML = `
            <div class="content-card">
                <button class="close-btn" onclick="limparCentro()">X</button>
                <h2 style="color:var(--accent); margin-bottom:20px;">⚽ Meus Palpites</h2>
                <p style="color:#64748b">A lista de jogos aparecerá aqui para ${usuarioLogado.Apelido}...</p>
            </div>`;
    }
</script>
</body>
</html>
