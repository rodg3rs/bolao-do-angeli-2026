<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bolão do Angeli 2026</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #ffc107; --border: #334155; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            display: grid; 
            grid-template-columns: 220px 1fr 650px; 
            grid-template-rows: 80px 1fr; 
        }
        
        header { 
            grid-column: 1 / -1; 
            background: var(--panel); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        header h1 { font-size: 26px; font-weight: bold; color: white; letter-spacing: 2px; text-transform: uppercase; }

        .sidebar-l { 
            background: var(--panel); 
            border-right: 1px solid var(--border); 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
        }
        .menu-label { color: #64748b; font-size: 0.75rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .menu-btn { padding: 12px 15px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; color: #94a3b8; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: none; background: transparent; width: 100%; text-align: left; font-size: 1rem; }
        .menu-btn:hover, .menu-btn.active { background: var(--border); color: white; }
        .spacer { flex-grow: 1; }

        main { 
            padding: 40px; 
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        /* Forms e Cards */
        .auth-card { background: var(--panel); padding: 30px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
        .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #94a3b8; font-weight: bold; transition: 0.3s; }
        .auth-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        .auth-form input { padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: white; outline: none; }
        .auth-form input:focus { border-color: var(--accent); }
        .auth-form button { padding: 12px; border-radius: 6px; border: none; background: var(--accent); color: black; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-reg { background: var(--success) !important; color: white !important; }

        /* Tabela de Palpites */
        .palpites-table { width: 100%; border-collapse: collapse; }
        .palpites-table th { color: var(--accent); text-align: left; padding: 10px; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .palpites-table td { padding: 12px 10px; border-bottom: 1px solid #334155; }
        .input-score { width: 50px; padding: 6px; text-align: center; background: var(--bg); border: 1px solid var(--border); color: var(--accent); font-weight: bold; border-radius: 4px; }

        /* Direita */
        .sidebar-r { background: #162033; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .widget-box { display: flex; flex-direction: column; background: #0f172a; border-radius: 12px; padding: 15px; border: 1px solid var(--border); height: 100%; }
        .widget-title { color: var(--accent); font-weight: bold; margin-bottom: 15px; font-size: 0.85rem; text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .empty-state { color: #334155; font-style: italic; font-size: 1.1rem; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

    <header><h1>BOLÃO DO ANGELI - 2026</h1></header>

    <aside class="sidebar-l">
        <div class="menu-label">Menu Principal</div>
        <button class="menu-btn" id="btn-login" onclick="abrirLogin()">👤 Login</button>
        <button class="menu-btn" id="btn-palpites" onclick="abrirPalpites()">⚽ Meus Palpites</button>
        <button class="menu-btn" onclick="limparCentro()">👥 Galera</button>
        <button class="menu-btn" onclick="limparCentro()">📜 Regulamento</button>
        <button class="menu-btn" onclick="limparCentro()">⚙️ Admin</button>
        <div class="spacer"></div>
        <button class="menu-btn" style="color:#ef4444; border: 1px solid #ef444433; font-weight: bold; justify-content: center;" onclick="location.reload()">🚪 Sair</button>
    </aside>

    <main id="conteudo-central">
        <div class="empty-state">Selecione uma opção no menu lateral...</div>
    </main>

    <aside class="sidebar-r">
        <div class="widget-box">
            <div class="widget-title">🏆 Ranking Geral</div>
            <div id="rank-content" style="font-size: 0.9rem; color: #94a3b8; text-align: center;">Faça login para ver</div>
        </div>
        <div class="widget-box">
            <div class="widget-title">💬 Zoação (24h)</div>
            <div id="chat-content" style="font-size: 0.9rem; color: #94a3b8; text-align: center;">Faça login para ver</div>
            <input type="text" style="width: 100%; padding: 8px; margin-top: auto; background: var(--panel); border: 1px solid var(--border); color: white; border-radius: 4px;" placeholder="Zoe aqui...">
        </div>
    </aside>

<script>
    let user = null;

    function limparCentro() {
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('conteudo-central').innerHTML = '<div class="empty-state">Selecione uma opção no menu lateral...</div>';
    }

    function abrirLogin() {
        limparCentro();
        document.getElementById('btn-login').classList.add('active');
        document.getElementById('conteudo-central').innerHTML = `
            <div class="auth-card">
                <div class="auth-tabs">
                    <div id="t-entrar" class="auth-tab active" onclick="guiaAuth('entrar')">Entrar</div>
                    <div id="t-cadastrar" class="auth-tab" onclick="guiaAuth('cadastrar')">Cadastrar</div>
                </div>
                <div id="f-entrar">
                    <form class="auth-form" onsubmit="login(event)">
                        <input type="text" id="l-apelido" placeholder="Seu Apelido" required>
                        <input type="password" id="l-senha" placeholder="Sua Senha" required>
                        <button type="submit">Acessar Conta</button>
                    </form>
                </div>
                <div id="f-cadastrar" style="display:none;">
                    <form class="auth-form" onsubmit="cadastro(event)">
                        <input type="text" id="r-voucher" placeholder="ID (Voucher do Admin)" required>
                        <input type="text" id="r-nome" placeholder="Nome Completo" required>
                        <input type="text" id="r-apelido" placeholder="Apelido no Ranking" required>
                        <input type="password" id="r-senha" placeholder="Senha (6 dígitos)" required minlength="6" maxlength="6">
                        <input type="text" id="r-time" placeholder="Seu Time" required>
                        <button type="submit" class="btn-reg">Criar Minha Conta</button>
                    </form>
                </div>
            </div>`;
    }

    function guiaAuth(tipo) {
        document.getElementById('f-entrar').style.display = tipo === 'entrar' ? 'block' : 'none';
        document.getElementById('f-cadastrar').style.display = tipo === 'entrar' ? 'none' : 'block';
        document.getElementById('t-entrar').classList.toggle('active', tipo === 'entrar');
        document.getElementById('t-cadastrar').classList.toggle('active', tipo === 'cadastrar');
    }

    async function login(e) {
        e.preventDefault();
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ apelido: document.getElementById('l-apelido').value, senha: document.getElementById('l-senha').value })
        });
        const data = await res.json();
        if(data.success) { user = data.user; alert("Olá " + user.Apelido); limparCentro(); }
        else alert(data.message);
    }

    async function cadastro(e) {
        e.preventDefault();
        const res = await fetch('/cadastrar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                id: document.getElementById('r-voucher').value,
                nome: document.getElementById('r-nome').value,
                apelido: document.getElementById('r-apelido').value,
                senha: document.getElementById('r-senha').value,
                time: document.getElementById('r-time').value
            })
        });
        const data = await res.json();
        alert(data.message);
        if(data.success) guiaAuth('entrar');
    }

    async function abrirPalpites() {
        if(!user) return alert("Faça login primeiro!");
        limparCentro();
        document.getElementById('btn-palpites').classList.add('active');
        const main = document.getElementById('conteudo-central');
        main.innerHTML = '<div class="empty-state">Carregando seus jogos...</div>';

        const res = await fetch(`/minhas-apostas/${user.Apelido}`);
        const data = await res.json();

        let html = `
            <div class="auth-card" style="max-width: 800px;">
                <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
                    <h2 style="color:var(--accent)">Meus Palpites</h2>
                    <button onclick="limparCentro()" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">X</button>
                </div>
                <table class="palpites-table">
                    <thead><tr><th>Jogo</th><th align="right">Mandante</th><th>X</th><th>Visitante</th></tr></thead>
                    <tbody>`;
        
        data.apostas.forEach(j => {
            html += `<tr>
                <td style="font-size:0.7rem; color:#64748b;">${j.Data} ${j.Horario}</td>
                <td align="right">${j.Sel1} <input type="number" class="input-score" value="${j.Ap1}" onchange="salvar('${j.Jogo}', this)"></td>
                <td align="center" style="color:var(--accent)">X</td>
                <td><input type="number" class="input-score" value="${j.Ap2}" onchange="salvar('${j.Jogo}', this)"> ${j.Sel2}</td>
            </tr>`;
        });
        main.innerHTML = html + '</tbody></table></div>';
    }

    async function salvar(jogoNome, inputEl) {
        const row = inputEl.closest('tr');
        const scores = row.querySelectorAll('input');
        const res = await fetch('/salvar-palpite', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ apelido: user.Apelido, jogo: jogoNome, ap1: scores[0].value, ap2: scores[1].value })
        });
        const result = await res.json();
        if(!result.success) { alert(result.message); abrirPalpites(); }
    }
</script>
</body>
</html>
