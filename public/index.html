<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bolão do Angeli 2026</title>
    <style>
        body { font-family: sans-serif; background: #1a3a5a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #666; }
        .tab.active { color: #007bff; border-bottom: 2px solid #007bff; font-weight: bold; }
        .form-group { display: none; }
        .form-group.active { display: block; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .error { color: red; font-size: 13px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">Entrar</div>
        <div class="tab" onclick="switchTab('cadastro')">Novo Cadastro</div>
    </div>

    <div id="login" class="form-group active">
        <form action="/auth" method="POST">
            <input type="text" name="apelido" placeholder="Seu Apelido" required>
            <input type="password" name="senha" placeholder="Sua Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

    <div id="cadastro" class="form-group">
        <form action="/login" method="POST">
            <input type="text" name="voucher" placeholder="Voucher (6 caracteres)" required maxlength="6">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="text" name="apelido" placeholder="Apelido" required>
            <input type="password" name="senha" placeholder="Crie uma Senha (mín. 6)" required minlength="6">
            <button type="submit" style="background: #007bff;">Cadastrar</button>
        </form>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-group').forEach(f => f.classList.remove('active'));
        
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }
</script>

</body>
</html>
