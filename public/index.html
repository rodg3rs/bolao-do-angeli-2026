<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bolão do Angeli 2026 - Login</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #ffc107; --border: #334155; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 12px; width: 350px; border: 1px solid var(--border); }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #94a3b8; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        form { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; }
        button { padding: 12px; background: var(--accent); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="tabs">
            <div id="t-in" class="tab active" onclick="setModo('in')">Entrar</div>
            <div id="t-up" class="tab" onclick="setModo('up')">Cadastrar</div>
        </div>
        <form onsubmit="executar(event)">
            <input type="text" name="apelido" id="user" placeholder="Apelido" required>
            <div id="box-up" style="display:none; flex-direction:column; gap:10px;">
                <input type="text" name="nome" placeholder="Nome Completo">
            </div>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit" id="btn">Acessar</button>
        </form>
    </div>
    <script>
        let modo = 'in';
        function setModo(m) {
            modo = m;
            document.getElementById('t-in').classList.toggle('active', m === 'in');
            document.getElementById('t-up').classList.toggle('active', m === 'up');
            document.getElementById('box-up').style.display = m === 'up' ? 'flex' : 'none';
            document.getElementById('btn').innerText = m === 'in' ? 'Acessar' : 'Cadastrar';
        }
        async function executar(e) {
            e.preventDefault();
            const dados = Object.fromEntries(new FormData(e.target));
            const res = await fetch(modo === 'in' ? '/auth' : '/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            if (res.ok) {
                if (modo === 'in') {
                    const user = await res.json();
                    window.location.href = `dashboard.html?id=${user.id}&apelido=${user.apelido}`;
                } else { alert("Cadastrado! Faça login."); setModo('in'); }
            } else { alert(await res.text()); }
        }
    </script>
</body>
</html>
