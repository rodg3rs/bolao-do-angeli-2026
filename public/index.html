<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Angeli - Copa 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #ffc107;
            --border: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
        }

        .menu-item {
            color: var(--text-secondary);
            transition: all 0.2s ease;
            font-size: 0.9rem;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 8px;
        }

        .menu-item:hover, .menu-item.active {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .menu-item.active { border-left: 3px solid var(--accent); }

        .list-scroll { overflow-y: auto; flex-grow: 1; scrollbar-width: thin; }
        
        .empty-state { color: #475569; font-style: italic; text-align: center; margin-top: 40px; }
    </style>
</head>
<body class="antialiased">

<header class="w-full pt-4 px-4 bg-[var(--bg)]">
    <div class="max-w-[1600px] mx-auto flex flex-col items-center">
        <h1 class="text-[22px] font-bold tracking-normal text-center uppercase m-0 leading-tight">
            BOLÃO DO ANGELI - 2026
        </h1>
        <div id="user-display" class="text-[var(--accent)] text-sm font-medium mt-1 tracking-normal uppercase">
            	Visitante
        </div>
    </div>
</header>

    <nav class="w-full py-1 px-4 border-b border-[var(--border)] mb-0 mt-0">
        <div class="max-w-[1600px] mx-auto flex items-center justify-center gap-2 overflow-x-auto pb-2">
            <button onclick="carregarModulo('login.html', this)" class="menu-item active !w-auto">
                <i class="fas fa-user-circle"></i> Login
            </button>
            <button onclick="abrirPalpites(this)" class="menu-item !w-auto">
                <i class="fas fa-futbol"></i> Meus Palpites
            </button>
            <button onclick="limparCentro(this)" class="menu-item !w-auto">
                <i class="fas fa-users"></i> Galera
            </button>
            <button onclick="limparCentro(this)" class="menu-item !w-auto">
                <i class="fas fa-file-alt"></i> Regulamento
            </button>
            <button onclick="carregarModulo('admin.html', this)" class="menu-item !w-auto">
                <i class="fas fa-cogs"></i> Admin
            </button>
            
            <button onclick="location.reload()" class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium bg-red-950/40 text-red-300 hover:bg-red-900/60 ml-4">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>
    </nav>

<main class="flex-grow w-full max-w-[1600px] mx-auto pt-1 px-4 md:px-6 pb-6 grid grid-cols-1 xl:grid-cols-[250px_1fr_250px] gap-0">
        
        <aside class="xl:col-span-1 order-2 xl:order-1">
            <section class="card-panel p-5 h-full flex flex-col min-h-[500px]">
		<div class="flex items-center gap-3 mb-4 border-b border-[var(--border)] pb-3">
    			<i class="fas fa-trophy text-[var(--accent)] text-sm"></i>
    			<h2 class="text-sm font-bold tracking-tight uppercase text-[var(--accent)]">Ranking Geral</h2>
		</div>
                <div id="lista-ranking" class="list-scroll space-y-1">
                    </div>
            </section>
        </aside>

	<div id="conteudo-central" class="xl:col-span-1 order-1 xl:order-2 card-panel p-0 flex flex-col items-center justify-center min-h-[400px] rounded-none border-r-0 overflow-hidden relative bg-center bg-cover bg-no-repeat" 
     		style="background-image: url('/img/copa2026.png');">
    	</div>

        <aside class="xl:col-span-1 order-3">
            <section class="card-panel p-5 h-full flex flex-col min-h-[500px]">
		<div class="flex items-center gap-3 mb-4 border-b border-[var(--border)] pb-3">
 		   <i class="fas fa-comments text-[var(--accent)] text-sm"></i>
 		   <h2 class="text-sm font-bold tracking-tight uppercase text-[var(--accent)]">Zoação (24h)</h2>
		</div>
                <div id="container-chat-fixo" class="flex-grow flex flex-col overflow-hidden">
                    <div class="text-center text-sm text-[var(--text-secondary)] py-10">Carregando chat...</div>
                </div>
            </section>
        </aside>
    </main>

    <footer class="w-full py-4 px-8 border-t border-[var(--border)] bg-[var(--bg)] mt-auto">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center text-[var(--text-secondary)] text-sm">
            <p>&copy; 2026 Bolão do Angeli by Rodg3rs</p>
            <p class="font-monospace opacity-30 text-[10px]"> v.2026-04-09_22:00</p>
        </div>
    </footer>

    <script>
        // --- VARIÁVEIS DE ESTADO (Vindo do index original) ---
        let usuarioLogado = null;

        // --- NAVEGAÇÃO E MÓDULOS ---
	function limparCentro(el) {
    		atualizarMenuAtivo(el);
    	// Apenas limpa o conteúdo. O background definido no CSS/Style continuará lá.
    		document.getElementById('conteudo-central').innerHTML = ''; 
	}

        async function carregarModulo(arquivo, el) {
            atualizarMenuAtivo(el);
            try {
                const response = await fetch(`${arquivo}?v=${new Date().getTime()}`);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const html = await response.text();
                const centro = document.getElementById('conteudo-central');
                centro.innerHTML = html;

                // Re-executar scripts do módulo carregado
                centro.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.text = oldScript.text;
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            } catch (e) {
                console.error("Erro ao carregar módulo:", e);
                document.getElementById('conteudo-central').innerHTML = `<div class="empty-state text-red-500">Erro: ${e.message}</div>`;
            }
        }

        function abrirPalpites(el) {
            if(!usuarioLogado) {
                alert("Acesse sua conta primeiro!");
                carregarModulo('login.html', document.querySelector('[onclick*="login.html"]'));
                return;
            }
            carregarModulo('palpites.html', el);
        }

        function atualizarMenuAtivo(el) {
            document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function definirUsuario(dados) {
            usuarioLogado = dados;
            document.getElementById('user-display').innerText = usuarioLogado.Apelido;
            enviarPing();
            limparCentro();
        }

        // --- RANKING E PRESENÇA (Lógica original Turso/SQLite) ---
        async function carregarRanking() {
            try {
                const res = await fetch('/api/ranking');
                const data = await res.json();
                if(data.success && data.ranking) {
                    let html = '';
                    data.ranking.forEach((user, index) => {
                        const onlineIcon = user.Online === 1 ? '<span class="text-green-500 ml-1 text-[10px]">●</span>' : '';
                        html += `
			<div class="flex justify-between items-center py-1 px-2 hover:bg-white/5 transition-colors border-none">
                        	<span class="text-sm text-[var(--text-primary)]">
                        		<b class="opacity-50">${index + 1}º</b> ${user.Apelido} ${onlineIcon}
                        	</span>
                        	<b class="text-[var(--accent)] text-xs">${user.Total || 0} pts</b>
                    </div>`;
                    });
                    document.getElementById('lista-ranking').innerHTML = html;
                }
            } catch(e) { console.error("Erro ranking:", e); }
        }

        async function enviarPing() {
            if (!usuarioLogado?.Apelido) return;
            try {
                await fetch('/api/ping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apelido: usuarioLogado.Apelido })
                });
            } catch (e) { console.error("Erro ping:", e); }
        }

        async function inicializarChatFixo() {
            try {
                const res = await fetch('chat.html');
                const html = await res.text();
                const container = document.getElementById('container-chat-fixo');
                container.innerHTML = html;
                container.querySelectorAll('script').forEach(s => {
                    const ns = document.createElement('script');
                    ns.text = s.text;
                    document.body.appendChild(ns);
                });
            } catch (e) { console.error("Erro chat:", e); }
        }

        // --- INICIALIZAÇÃO ---
        document.addEventListener('DOMContentLoaded', () => {
            carregarRanking();
            inicializarChatFixo();
            setInterval(carregarRanking, 10000);
            setInterval(enviarPing, 30000);
        });
    </script>
</body>
</html>
