<div id="admin-content" style="display: none;">
    <div class="widget-box" style="width: 100%; max-width: 700px; margin: 0 auto;">
        <div class="widget-title" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <span style="font-size: 1rem; color: #ef4444;">⚙️ PAINEL ADMINISTRATIVO</span>
            <button onclick="sairAdmin()" style="background: #ef4444; color: white; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem;">
                Sair do Admin
            </button>
        </div>
        <div id="admin-jogos-lista" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px; max-height: 70vh; overflow-y: auto;">
            <div class="empty-state">Carregando jogos...</div>
        </div>
    </div>
</div>

<script>
    // Função para sair e resetar para Visitante sem mexer no Index
    function sairAdmin() {
        // 1. Reset da variável global
        usuarioLogado = null;
        
        // 2. Restaura o cabeçalho original no Index
        const display = document.getElementById('user-display');
        if (display) {
            display.innerText = "Visitante";
            display.style.color = "var(--accent)";
        }
        
        // 3. Limpa o centro (chama a função que já existe no index.html)
        limparCentro();
    }

    (function() {
        const senha = prompt("Digite a senha de administrador:");
        
        if (senha === "angeli2026") {
            usuarioLogado = { Apelido: "ADMIN", ID: "000", admin: true };
            
            const display = document.getElementById('user-display');
            if(display) {
                display.innerText = "MODO ADMINISTRADOR";
                display.style.color = "#ef4444";
            }

            document.getElementById('admin-content').style.display = 'block';
            carregarJogosAdmin();
        } else {
            alert("Senha incorreta!");
            limparCentro();
        }
    })();

    async function carregarJogosAdmin() {
        try {
            const res = await fetch('/api/admin/jogos');
            const data = await res.json();
            if (data.success && data.jogos) {
                const container = document.getElementById('admin-jogos-lista');
                let html = '';
                data.jogos.forEach(jogo => {
                    const res1 = jogo.Res1 !== null ? jogo.Res1 : '';
                    const res2 = jogo.Res2 !== null ? jogo.Res2 : '';
                    html += `
			<div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05);">
            			<div style="font-size: 0.75rem; color: #94a3b8; width: 70px;">${jogo.Data}</div>
            
            			<div style="flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; font-size: 0.9rem;">
                			<span style="width: 100px; text-align: right;">${jogo.Sel1}</span>
                			<input type="number" id="admin-res1-${jogo.Jogo}" value="${res1}" 
                       				style="width: 35px; background: #0f172a; color: #ffc107; border: 1px solid #334155; text-align: center; font-weight: bold; border-radius: 4px;">
                			<span style="color: #64748b;">x</span>
                			<input type="number" id="admin-res2-${jogo.Jogo}" value="${res2}" 
                       				style="width: 35px; background: #0f172a; color: #ffc107; border: 1px solid #334155; text-align: center; font-weight: bold; border-radius: 4px;">
                			<span style="width: 100px; text-align: left;">${jogo.Sel2}</span>
            			</div>
            
            			<button onclick="salvarResultadoEAtualizarPontos('${jogo.Jogo}')" 
                    			style="color: #10b981; background: none; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; padding-left: 10px;">
                		Salvar
            			</button>
        		</div>`;
                });
                container.innerHTML = html;
            }
        } catch (e) { console.error(e); }
    }

    async function salvarResultadoEAtualizarPontos(jogoId) {
        const res1 = document.getElementById(`admin-res1-${jogoId}`).value;
        const res2 = document.getElementById(`admin-res2-${jogoId}`).value;
        try {
            const response = await fetch('/api/admin/atualizar_resultado', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jogo: jogoId, res1, res2 })
            });
            const data = await response.json();
            if (data.success) {
                alert("Resultado e pontos atualizados!");
                if(typeof carregarRanking === 'function') carregarRanking();
            }
        } catch (e) { alert("Erro ao salvar."); }
    }
</script>
