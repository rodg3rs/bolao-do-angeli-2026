<div id="admin-content" style="display: none;">
    <div style="background: rgba(239, 68, 68, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ef4444; text-align: center;">
        <strong style="color: #ef4444; font-size: 0.9rem;">SESSÃO ADMINISTRATIVA ATIVA</strong><br>
        <small style="color: #94a3b8;">Logado como <b>ADMIN</b>. Palpites bloqueados.</small>
    </div>

    <div class="widget-box" style="width: 100%; max-width: 700px; margin: 0 auto;">
        <div class="widget-title" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <span style="font-size: 1rem; color: #ef4444;">⚙️ PAINEL ADMINISTRATIVO</span>
            <button onclick="limparCentro()" style="background: #ef4444; color: white; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s;">
                Sair
            </button>
        </div>
        <div id="admin-jogos-lista" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px; max-height: 70vh; overflow-y: auto; padding-right: 5px;">
            <div class="empty-state">Carregando jogos...</div>
        </div>
    </div>
</div>

<script>
    (function() {
        const senha = prompt("Digite a senha de administrador:");
        
        if (senha === "angeli2026") {
            // 1. Define a identidade de ADMIN para o Chat e Sistema
            usuarioLogado = { Apelido: "ADMIN", ID: "000", admin: true };
            
            // 2. Atualiza o display no topo (index.html)
            const display = document.getElementById('user-display');
            if(display) {
                display.innerText = "MODO ADMINISTRADOR";
                display.style.color = "#ef4444";
            }

            // 3. Mostra o conteúdo e carrega os jogos
            document.getElementById('admin-content').style.display = 'block';
            carregarJogosAdmin(); 
        } else {
            alert("Senha incorreta!");
            limparCentro(); // Função que já existe no seu index.html
        }
    })();

    // Mantenha aqui as suas funções carregarJogosAdmin() e salvarResultadoEAtualizarPontos() que já conversamos
    async function carregarJogosAdmin() { 
        /* ... seu código original de busca ... */ 
        try {
            const res = await fetch('/api/admin/jogos');
            const data = await res.json();
            if (data.success && data.jogos) {
                const container = document.getElementById('admin-jogos-lista');
                let html = '';
                data.jogos.forEach(jogo => {
                    const res1 = jogo.Res1 !== null ? jogo.Res1 : '';
                    const res2 = jogo.Res2 !== null ? jogo.Res2 : '';
                    html += `<div style="background: #162033; border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px;">
                                <div style="font-size: 0.75rem; color: #94a3b8; width: 80px; text-align: center;"><b>${jogo.Data}</b><br>${jogo.Horario}</div>
                                <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 10px;">
                                    <span style="font-weight: bold;">${jogo.Sel1}</span>
                                    <input type="number" id="admin-res1-${jogo.Jogo}" value="${res1}" style="width: 45px; text-align: center; background: var(--bg); color: white; border: 1px solid var(--border);">
                                    <span>X</span>
                                    <input type="number" id="admin-res2-${jogo.Jogo}" value="${res2}" style="width: 45px; text-align: center; background: var(--bg); color: white; border: 1px solid var(--border);">
                                    <span style="font-weight: bold;">${jogo.Sel2}</span>
                                </div>
                                <button onclick="salvarResultadoEAtualizarPontos('${jogo.Jogo}')" style="background: var(--success); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer;">Salvar</button>
                            </div>`;
                });
                container.innerHTML = html;
            }
        } catch (e) { console.error(e); }
    }

    async function salvarResultadoEAtualizarPontos(jogoId) {
        /* ... seu código original de salvar ... */
        const res1 = document.getElementById(`admin-res1-${jogoId}`).value;
        const res2 = document.getElementById(`admin-res2-${jogoId}`).value;
        try {
            const response = await fetch('/api/admin/atualizar_resultado', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jogo: jogoId, res1, res2 })
            });
            const data = await response.json();
            if (data.success) {
                alert("Resultado salvo!");
                if(typeof carregarRanking === 'function') carregarRanking();
            }
        } catch (e) { alert("Erro ao salvar."); }
    }
</script>
