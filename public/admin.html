<div class="widget-box" style="width: 100%; max-width: 700px; margin: 0 auto;">
    
    <div class="widget-title" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
        <span style="font-size: 1rem; color: #ef4444;">⚙️ PAINEL ADMINISTRATIVO</span>
        <button onclick="limparCentro()" style="background: #ef4444; color: white; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s;">
            Sair
        </button>
    </div>

    <div id="admin-jogos-lista" style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px; max-height: 70vh; overflow-y: auto; padding-right: 5px;">
        <div class="empty-state">Carregando tabela de jogos...</div>
    </div>
</div>

<script>
    // 1. Busca todos os jogos no banco de dados e monta a lista na tela
    async function carregarJogosAdmin() {
        try {
            const res = await fetch('/api/admin/jogos');
            const data = await res.json();

            if (data.success && data.jogos) {
                const container = document.getElementById('admin-jogos-lista');
                let html = '';

                data.jogos.forEach(jogo => {
                    // Trata caso o resultado seja null (ainda não preenchido)
                    const res1 = jogo.Res1 !== null ? jogo.Res1 : '';
                    const res2 = jogo.Res2 !== null ? jogo.Res2 : '';

                    html += `
                        <div style="background: #162033; border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px;">
                            
                            <div style="font-size: 0.75rem; color: #94a3b8; width: 80px; text-align: center; border-right: 1px solid var(--border); padding-right: 10px;">
                                <b>${jogo.Data}</b><br>${jogo.Horario}
                            </div>
                            
                            <div style="flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 10px;">
                                <span style="font-weight: bold; width: 100px; text-align: right;">${jogo.Sel1}</span>
                                
                                <input type="number" id="admin-res1-${jogo.Jogo}" value="${res1}" 
                                       style="width: 45px; height: 35px; text-align: center; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: white; font-weight: bold; font-size: 1rem;" min="0">
                                
                                <span style="color: #64748b; font-weight: bold;">X</span>
                                
                                <input type="number" id="admin-res2-${jogo.Jogo}" value="${res2}" 
                                       style="width: 45px; height: 35px; text-align: center; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: white; font-weight: bold; font-size: 1rem;" min="0">
                                
                                <span style="font-weight: bold; width: 100px; text-align: left;">${jogo.Sel2}</span>
                            </div>
                            
                            <div>
                                <button onclick="salvarResultadoEAtualizarPontos('${jogo.Jogo}')" 
                                        style="background: var(--success); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">
                                    Salvar Oficial
                                </button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            }
        } catch (e) {
            console.error("Erro ao carregar jogos admin", e);
            document.getElementById('admin-jogos-lista').innerHTML = 
                `<div class="empty-state" style="color: #ef4444;">Erro de conexão com o banco de dados.</div>`;
        }
    }

    // 2. Aciona a sua Rota Mágica de salvar o resultado e calcular todos os pontos
    async function salvarResultadoEAtualizarPontos(jogoId) {
        const inputR1 = document.getElementById(`admin-res1-${jogoId}`).value;
        const inputR2 = document.getElementById(`admin-res2-${jogoId}`).value;

        if (inputR1 === '' || inputR2 === '') {
            alert('Atenção: Preencha o placar das duas equipes antes de salvar!');
            return;
        }

        try {
            const response = await fetch('/api/admin/atualizar_resultado', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ jogo: jogoId, res1: inputR1, res2: inputR2 })
            });
            const data = await response.json();

            if (data.success) {
                alert(`Sucesso! Resultado do Jogo ${jogoId} salvo e todos os pontos dos usuários foram atualizados!`);
                // Como bônus, recarrega o ranking no menu lateral se ele estiver lá
                if(typeof carregarRanking === 'function') carregarRanking(); 
            } else {
                alert('Ocorreu um erro ao salvar o resultado.');
            }
        } catch (e) {
            console.error('Erro ao comunicar com o servidor:', e);
            alert('Falha na comunicação com o Servidor!');
        }
    }

    // Dispara a montagem da tabela assim que o módulo for aberto
    carregarJogosAdmin();
</script>
