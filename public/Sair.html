<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Até logo!</title>
    <link rel="stylesheet" href="css/estilo-saida.css">
    <style>
        /* Caso não tenha o CSS externo ainda, aqui está o básico: */
        .background-full {
            height: 100vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-image 0.5s ease-in-out;
        }
        .mensagem {
            background: rgba(15, 23, 42, 0.85); /* Tom azul do seu index */
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            color: white;
            border: 1px solid #334155;
        }
        .btn-voltar {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ffc107; /* Seu amarelo accent */
            color: #0f172a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body onload="escolherFundoAleatorio()" style="margin:0;">
    <div id="tela-saida" class="background-full">
        <div class="mensagem">
            <h1>Obrigado por participar!</h1>
            <p>Seus palpites foram salvos. Voltamos em breve!</p>
            <a href="index.html" class="btn-voltar">Entrar Novamente</a>
        </div>
    </div>

    <script>
        function escolherFundoAleatorio() {
            const total = 4;
            const num = Math.floor(Math.random() * total) + 1;
            // CORREÇÃO AQUI: Alterado de .jpg para .webp para bater com suas fotos
            const path = `/img/fut-${num}.webp`;
            document.getElementById('tela-saida').style.backgroundImage = `url('${path}')`;
        }
    </script>
</body>
</html>
