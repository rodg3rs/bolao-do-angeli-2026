<style>
    /* Layout Centralizado e Moderno */
    .palpites-central {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        width: 100%;
        max-width: 650px;
        border: 1px solid #334155;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .palpites-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 1px solid #334155;
        padding-bottom: 10px;
    }
    .btn-fechar-p {
        background: #ef4444; color: white; border: none; padding: 6px 12px;
        border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    .tabela-p { width: 100%; border-collapse: collapse; }
    .linha-j { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .col-p { padding: 12px 5px; font-size: 0.9rem; color: white; }
    
    /* Inputs menores e limitados */
    .input-gols {
        width: 45px; height: 35px; background: #0f172a;
        border: 1px solid #334155; color: #ffc107;
        text-align: center; border-radius: 6px; font-weight: bold;
        font-size: 1.1rem; margin: 0 5px;
    }
    .input-gols:disabled { opacity: 0.4; cursor: not-allowed; }
    .data-j { font-size: 0.7rem; color: #64748b; display: block; }
</style>

<div class="palpites-central">
    <div class="palpites-header">
        <h2 id="titulo-p" style="color: #ffc107; font-size: 1.1rem;">Meus Palpites</h2>
<button class="btn-fechar-p" onclick="salvarTudoESair()">Salvar e Voltar</button>
    </div>
    <div id="lista-jogos">Carregando...</div>
</div>

<script>
    // Ativa a trava de saída assim que o módulo carrega
    window.onbeforeunload = function() {
        return true; 
    };

    // 1. Função para Salvar Tudo ao clicar em "Voltar"
    async function salvarTudoESair() {
        // Desativa a trava antes de qualquer outra coisa para permitir a saída
        window.onbeforeunload = null;

        const palpitesParaEnviar = [];
        const linhas = document.querySelectorAll('.linha-j');

        linhas.forEach(linha => {
            const in1 = linha.querySelector('.input-ap1');
            const in2 = linha.querySelector('.input-ap2');

            // Só adiciona se o input não estiver desabilitado (trava de tempo)
            if (in1 && !in1.disabled) {
                palpitesParaEnviar.push({
                    jogo: in1.getAttribute('data-jogo'),
                    ap1: Math.min(10, Math.max(0, parseInt(in1.value) || 0)),
                    ap2: Math.min(10, Math.max(0, parseInt(in2.value) || 0))
                });
            }
        });

        if (palpitesParaEnviar.length > 0) {
            try {
                const response = await fetch('/salvar-palpite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        apelido: usuarioLogado.Apelido,
                        palpites: palpitesParaEnviar
                    })
                });

                const resultado = await response.json();
                if (resultado.success) {
                    limparCentro(); 
                } else {
                    alert("Erro ao salvar: " + resultado.message);
                    // Se deu erro, reativa a trava para o usuário não perder o que digitou
                    window.onbeforeunload = function() { return true; };
                }
            } catch (error) {
                alert("Falha de comunicação com o servidor.");
                window.onbeforeunload = function() { return true; };
            }
        } else {
            limparCentro();
        }
    }

    // 2. Renderização da Tabela
    (async function() {
        if(!usuarioLogado) {
            document.getElementById('lista-jogos').innerHTML = "<h2>Acesse sua conta primeiro!</h2>";
            return;
        }

        document.getElementById('titulo-p').innerText = "Palpites de: " + usuarioLogado.Apelido;
        
        try {
            const res = await fetch(`/minhas-apostas/${usuarioLogado.Apelido}`);
            const data = await res.json();
            
            let html = '<table class="tabela-p">';
            data.apostas.forEach(j => {
                const agora = new Date();
                const limite = new Date(`${j.Data}T${j.Horario}:00`);
                limite.setMinutes(limite.getMinutes() - 10);
                const bloqueado = agora > limite;

                html += `
                    <tr class="linha-j">
                        <td class="col-p" style="text-align:right;">
                            ${j.Sel1} <span class="data-j">${j.Data}</span>
                        </td>
                        <td style="text-align:center; white-space:nowrap;">
                            <input type="number" class="input-gols input-ap1" 
                                data-jogo="${j.Jogo}" value="${j.Ap1 || 0}" min="0" max="10"
                                ${bloqueado ? 'disabled' : ''}>
                            <b style="color:#64748b">x</b>
                            <input type="number" class="input-gols input-ap2" 
                                value="${j.Ap2 || 0}" min="0" max="10"
                                ${bloqueado ? 'disabled' : ''}>
                        </td>
                        <td class="col-p" style="text-align:left;">
                            ${j.Sel2} <span class="data-j">${j.Horario}h</span>
                        </td>
                    </tr>`;
            });
            document.getElementById('lista-jogos').innerHTML = html + "</table>";
        } catch (e) {
            document.getElementById('lista-jogos').innerHTML = "Erro ao carregar.";
        }
    })();
</script>
