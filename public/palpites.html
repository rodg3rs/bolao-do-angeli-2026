<script>
    (async function inicializarPalpites() {
        // Busca o usuário logado da variável global (window) definida no index/login
        // Adicionamos redundância para buscar no 'parent' caso esteja em um iframe
        const usuario = window.usuarioLogado || (window.parent ? window.parent.usuarioLogado : null);

        if (!usuario || !usuario.Apelido) {
            console.error("Usuário não encontrado no objeto window.usuarioLogado");
            document.getElementById('lista-jogos-container').innerHTML = 
                `<div style="text-align:center; padding:40px; color:#64748b;">
                    ⚠️ Sessão não identificada.<br>
                    <small>Por favor, tente clicar em 'Login' novamente.</small>
                </div>`;
            return;
        }

        try {
            // Busca as apostas usando o Apelido confirmado
            const res = await fetch(`/minhas-apostas/${usuario.Apelido}`);
            const data = await res.json();

            if (data.success) {
                renderizarTabela(data.apostas);
            } else {
                document.getElementById('lista-jogos-container').innerHTML = "Erro ao recuperar palpites.";
            }
        } catch (e) {
            console.error("Erro na comunicação:", e);
            document.getElementById('lista-jogos-container').innerHTML = "Servidor offline ou erro de rede.";
        }
    })();

    function renderizarTabela(apostas) {
        const container = document.getElementById('lista-jogos-container');
        let html = '<table class="tabela-palpites">';

        apostas.forEach(j => {
            // Regra de 10 minutos: Bloqueia se o horário atual passou do limite
            const agora = new Date();
            const dataJogo = j.Data; // YYYY-MM-DD
            const horaJogo = j.Horario; // HH:MM
            const limite = new Date(`${dataJogo}T${horaJogo}:00`);
            limite.setMinutes(limite.getMinutes() - 10);
            
            const bloqueado = agora > limite;

            html += `
                <tr class="linha-jogo">
                    <td class="col-time time-dir">
                        ${j.Sel1}
                        <span class="info-data">${formatarData(j.Data)}</span>
                    </td>
                    <td class="col-placar">
                        <input type="number" class="input-palpite" 
                            value="${j.Ap1}" min="0" max="10" 
                            ${bloqueado ? 'disabled' : ''}
                            onchange="enviarPalpite('${j.Jogo}', this.value, 'ap1', this)">
                        <span style="color: #64748b; font-weight: bold;">x</span>
                        <input type="number" class="input-palpite" 
                            value="${j.Ap2}" min="0" max="10" 
                            ${bloqueado ? 'disabled' : ''}
                            onchange="enviarPalpite('${j.Jogo}', this.value, 'ap2', this)">
                    </td>
                    <td class="col-time time-esq">
                        ${j.Sel2}
                        <span class="info-data">${j.Horario}h</span>
                    </td>
                </tr>`;
        });

        container.innerHTML = html + '</table>';
    }

    async function enviarPalpite(nomeJogo, valor, campo, inputEl) {
        // Garante que o valor esteja entre 0 e 10
        let v = parseInt(valor);
        if (isNaN(v) || v < 0) v = 0;
        if (v > 10) v = 10;
        inputEl.value = v;

        // Recupera o usuário novamente para garantir o envio
        const usuario = window.usuarioLogado || (window.parent ? window.parent.usuarioLogado : null);
        
        // Pega o valor do parceiro (o outro input da mesma linha)
        const linha = inputEl.closest('tr');
        const inputs = linha.querySelectorAll('.input-palpite');
        const v1 = parseInt(inputs[0].value);
        const v2 = parseInt(inputs[1].value);

        try {
            const res = await fetch('/salvar-palpite', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    apelido: usuario.Apelido,
                    jogo: nomeJogo,
                    ap1: v1,
                    ap2: v2
                })
            });

            const result = await res.json();
            if (!result.success) {
                alert(result.message); // Exibe o erro de tempo esgotado do backend
                location.reload(); 
            }
        } catch (e) {
            alert("Erro ao salvar palpite no servidor.");
        }
    }

    function formatarData(dataISO) {
        const [ano, mes, dia] = dataISO.split('-');
        return `${dia}/${mes}`;
    }
</script>
