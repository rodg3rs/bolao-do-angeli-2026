<style>
    /* Layout Centralizado e Moderno */
    .palpites-central {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        width: 100%;
        max-width: 650px;
        border: 1px solid #334155;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .palpites-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        border-bottom: 1px solid #334155;
        padding-bottom: 10px;
    }
    .btn-fechar-p {
        background: #ef4444; color: white; border: none; padding: 6px 12px;
        border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    .tabela-p { width: 100%; border-collapse: collapse; }
    .linha-j { border-bottom: 1px solid rgba(255,255,255,0.05); }
    .col-p { padding: 12px 5px; font-size: 0.9rem; color: white; }
    
    /* Inputs menores e limitados */
    .input-gols {
        width: 45px; height: 35px; background: #0f172a;
        border: 1px solid #334155; color: #ffc107;
        text-align: center; border-radius: 6px; font-weight: bold;
        font-size: 1.1rem; margin: 0 5px;
    }
    .input-gols:disabled { opacity: 0.4; cursor: not-allowed; }
    .data-j { font-size: 0.7rem; color: #64748b; display: block; }
</style>

<div id="painel-palpites" class="painel-central-container w-full h-full flex flex-col p-6 overflow-hidden">
    <div class="palpites-header">
        <h2 id="titulo-p" style="color: #ffc107; font-size: 1.1rem;">Meus Palpites</h2>
        <button class="btn-fechar-p" onclick="limparCentro()">Voltar</button>
    </div>
    <div id="lista-jogos">Carregando...</div>

<!-- Área de conteúdo com rolagem interna (igual ao Galera) -->
    <div class="flex-grow overflow-y-auto pr-2 custom-scroll">
        <div id="lista-jogos">
            <!-- A tabela será injetada aqui pelo JavaScript -->
        </div>
    </div>
</div>

<script>
    (async function() {
        // Voltando à verificação simples que você usava antes
        if(!usuarioLogado) {
            document.getElementById('lista-jogos').innerHTML = "<h2>Acesse sua conta primeiro!</h2>";
            return;
        }

        document.getElementById('titulo-p').innerText = "Palpites de: " + usuarioLogado.Apelido;
        
        try {
            const res = await fetch(`/minhas-apostas/${usuarioLogado.Apelido}`);
            const data = await res.json();
            
            let html = '<table class="tabela-p">';
            data.apostas.forEach(j => {
                // Trava de 10 minutos (Lógica do server.js)
                const agora = new Date();
                const limite = new Date(`${j.Data}T${j.Horario}:00`);
                limite.setMinutes(limite.getMinutes() - 10);
                const bloqueado = agora > limite;

                html += `
                    <tr class="linha-j">
                        <td class="col-p" style="text-align:right;">
                            ${j.Sel1} <span class="data-j">${j.Data}</span>
                        </td>
                        <td style="text-align:center; white-space:nowrap;">
                            <input type="number" class="input-gols" value="${j.Ap1}" min="0" max="10"
                                ${bloqueado ? 'disabled' : ''} 
                                onchange="salvar('${j.Jogo}', this.value, document.getElementById('ap2_${j.Jogo}').value)">
                            <b style="color:#64748b">x</b>
                            <input type="number" id="ap2_${j.Jogo}" class="input-gols" value="${j.Ap2}" min="0" max="10"
                                ${bloqueado ? 'disabled' : ''} 
                                onchange="salvar('${j.Jogo}', this.previousElementSibling.previousElementSibling.value, this.value)">
                        </td>
                        <td class="col-p" style="text-align:left;">
                            ${j.Sel2} <span class="data-j">${j.Horario}h</span>
                        </td>
                    </tr>`;
            });
            document.getElementById('lista-jogos').innerHTML = html + "</table>";
        } catch (e) {
            document.getElementById('lista-jogos').innerHTML = "Erro ao carregar.";
        }
    })();

    // Mantendo a função salvar exatamente como era, mas adicionando a trava 0-10
    async function salvar(jogo, a1, a2) {
        // Forçar limite 0-10
        let v1 = Math.min(10, Math.max(0, parseInt(a1) || 0));
        let v2 = Math.min(10, Math.max(0, parseInt(a2) || 0));

        await fetch('/salvar-palpite', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ apelido: usuarioLogado.Apelido, jogo, ap1: v1, ap2: v2 })
        });
    }
</script>
