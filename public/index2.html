<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Mobile V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #ffc107;
            --border: #334155;
        }

        /* ESCALA GLOBAL: Aumentando a base para que TODO o projeto cresça */
        html {
            font-size: 24px; /* Aumenta tudo que usa rem em 1.5x a 2x */
        }

        body {
            background-color: var(--bg);
            color: #f1f5f9;
            font-family: sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        /* Menu de Ícones em Grade */
        .icon-nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 ícones por linha */
            gap: 12px;
            padding: 15px;
        }

        .icon-button {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 15px;
            aspect-ratio: 1 / 1; /* Mantém o botão quadrado */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem; /* Ícone grande */
            color: #94a3b8;
            transition: all 0.2s;
        }

        .icon-button.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header class="p-6 text-center">
    <h1 class="text-3xl font-black text-[var(--accent)]">BOLÃO 2026</h1>
    <div id="user-display" class="text-sm mt-2 opacity-70">Visitante</div>
</header>

<nav class="icon-nav-grid">
    <button onclick="carregarModulo('login.html', this)" class="icon-button active" title="Login">
        <i class="fas fa-user-circle"></i>
    </button>
    <button onclick="abrirPalpites(this)" class="icon-button" title="Palpites">
        <i class="fas fa-futbol"></i>
    </button>
    <button onclick="carregarModulo('galera.html', this)" class="icon-button" title="Galera">
        <i class="fas fa-users"></i>
    </button>
    <button onclick="carregarModulo('estatistica.html', this)" class="icon-button" title="Estatísticas">
        <i class="fas fa-chart-bar"></i>
    </button>
    <button onclick="carregarModulo('regulamento.html', this)" class="icon-button" title="Regulamento">
        <i class="fas fa-file-alt"></i>
    </button>
    <button onclick="carregarModulo('ranking.html', this)" class="icon-button" title="Ranking">
        <i class="fas fa-trophy"></i>
    </button>
    <button onclick="carregarModulo('admin.html', this)" class="icon-button" title="Admin">
        <i class="fas fa-cogs"></i>
    </button>
    <button onclick="sairSistema()" class="icon-button bg-red-900/20 text-red-500 border-red-900" title="Sair">
        <i class="fas fa-sign-out-alt"></i>
    </button>
</nav>

<main class="p-4">
    <div id="conteudo-central" class="bg-[var(--card-bg)] rounded-3xl p-6 shadow-2xl min-h-[300px]">
        <div id="welcome-message" class="text-center py-10">
            <p class="font-bold text-[var(--accent)]">SELECIONE UMA OPÇÃO ACIMA</p>
        </div>
        <div id="modulo-container"></div>
    </div>
</main>

<script>
    let usuarioLogado = null;

    // Função de Injeção que limpa a tela de entrada
    async function carregarModulo(arquivo, el) {
        atualizarMenuAtivo(el);
        document.getElementById('welcome-message').classList.add('hidden');
        const container = document.getElementById('modulo-container');
        
        container.innerHTML = '<p class="text-center">Carregando...</p>';
        
        try {
            const res = await fetch(arquivo);
            const html = await res.text();
            container.innerHTML = html;
            
            // Executa scripts internos do módulo
            container.querySelectorAll('script').forEach(oldScript => {
                const newScript = document.createElement('script');
                newScript.text = oldScript.text;
                document.body.appendChild(newScript);
            });
        } catch (e) {
            container.innerHTML = "Erro ao carregar módulo.";
        }
    }

    function atualizarMenuAtivo(el) {
        document.querySelectorAll('.icon-button').forEach(b => b.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function definirUsuario(dados) {
        usuarioLogado = dados;
        document.getElementById('user-display').innerText = `Olá, ${dados.Apelido}`;
        document.getElementById('welcome-message').classList.add('hidden');
        document.getElementById('modulo-container').innerHTML = `<p class="text-center text-[var(--accent)] font-bold">Login realizado!</p>`;
    }

    function sairSistema() {
        localStorage.clear();
        window.location.href = 'sair.html';
    }
</script>
</body>
</html>
