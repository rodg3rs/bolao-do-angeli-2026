<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão 2026 - Mobile V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #ffc107;
            --border: #334155;
        }

/* 1. Unificando a fonte do Visitante e do Menu */
#user-display, 
.icon-button span {
    color: #ffffff !important;
    font-size: 1.2rem !important; /* Tamanho unificado */
    font-weight: 800;            /* Deixa o texto mais "robusto" */
    text-transform: uppercase;
    letter-spacing: 1px;        /* Melhora a leitura no telemóvel */
}

/* 2. Ajuste específico para o Visitante (reforço) */
#user-display {
    opacity: 1 !important;
    display: inline-block;
    margin-top: 10px;
}

/* Garante que o texto dentro dos módulos carregados também herde a cor */
#modulo-ranking-container, 
#container-chat-fixo {
    min-height: 450px; /* Altura para garantir boa visualização lateral */
    max-height: 600px; /* Evita que fiquem infinitamente longos */
    overflow-y: auto;  /* Rolagem vertical interna */
    font-size: 1.4rem; /* Fonte igual ao Visitante */
    color: #ffffff;
}

/* Ajuste para que tabelas ou listas internas não quebrem o layout */
#modulo-ranking-container table, 
#container-chat-fixo div {
    width: 100%;
}

/* Container Central Flexível e Transparente */
#conteudo-central {
    background-color: rgba(30, 41, 59, 0.4) !important;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    min-height: 80px; /* Começa da altura aproximada de um botão */
    height: auto;      /* Permite expandir conforme o conteúdo */
    transition: all 0.3s ease; /* Transição suave ao expandir */
}

        /* ESCALA GLOBAL: Aumentando a base para que TODO o projeto cresça */
        html {
            font-size: 24px; /* Aumenta tudo que usa rem em 1.5x a 2x */
        }

body {
    /* 1. Camada de cor (ofuscamento) + Imagem */
    background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                      url('/img/copa2026.png');
    
    /* 2. Fixação e Ajuste */
    background-attachment: fixed; /* Não rola com a página */
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover; /* Preenche toda a tela */

    /* Cores base */
    color: var(--text-primary);
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}

        /* Menu de Ícones em Grade */
/* 1. Grade de 3 colunas para botões mais largos */
.icon-nav-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 10px;
    padding: 15px;
}

/* 2. Botão Retangular: Ícone na frente do texto */
.icon-button {
    background: rgba(30, 41, 59, 0.7); /* Mais transparente para ver o fundo */
    border: 2px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: row; /* Alinhamento horizontal */
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 10px;
    color: #f1f5f9;
    min-height: 60px;
}

.icon-button i {
    font-size: 1.2rem;
}

.icon-button span {
    font-size: 0.8rem;
    font-weight: bold;
    text-transform: uppercase;
}

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header class="p-6 text-center">
    <h1 class="text-3xl font-black text-[var(--accent)]">BOLÃO DO ANGELI 2026</h1>
    <div id="user-display" class="text-sm mt-2 opacity-70">Visitante</div>
</header>

<nav class="icon-nav-grid">
    <button onclick="carregarModulo('login.html', this)" class="icon-button active">
        <i class="fas fa-user-circle"></i>
        <span>Login</span>
    </button>
    <button onclick="abrirPalpites(this)" class="icon-button">
        <i class="fas fa-futbol"></i>
        <span>Palpites</span>
    </button>
    <button onclick="carregarModulo('galera.html', this)" class="icon-button">
        <i class="fas fa-users"></i>
        <span>Galera</span>
    </button>
    <button onclick="carregarModulo('estatistica.html', this)" class="icon-button">
        <i class="fas fa-chart-bar"></i>
        <span>Stats</span>
    </button>
    <button onclick="carregarModulo('regulamento.html', this)" class="icon-button">
        <i class="fas fa-file-alt"></i>
        <span>Regras</span>
    </button>
    <button onclick="sairSistema()" class="icon-button bg-red-900/40 border-red-700">
        <i class="fas fa-sign-out-alt"></i>
        <span>Sair</span>
    </button>
</nav>

<main class="p-4 flex flex-col gap-6">
    <div id="conteudo-central" class="rounded-3xl p-6 shadow-2xl overflow-hidden">
        <div id="welcome-message" class="text-center">
            <p class="font-bold text-[var(--accent)] text-sm">SELECIONE UMA OPÇÃO</p>
        </div>
        <div id="modulo-container"></div>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full">
        <div id="modulo-ranking-container" class="bg-slate-800/30 rounded-2xl p-4 border border-white/10 overflow-x-auto">
            </div>

        <section id="container-chat-fixo" class="bg-slate-800/30 rounded-2xl p-4 border border-white/10 overflow-x-auto">
            </section>
    </div>
</main>

<script>
    let usuarioLogado = null;

    // Função de Injeção que limpa a tela de entrada
    async function carregarModulo(arquivo, el) {
        atualizarMenuAtivo(el);
        document.getElementById('welcome-message').classList.add('hidden');
        const container = document.getElementById('modulo-container');
        
        container.innerHTML = '<p class="text-center">Carregando...</p>';
        
        try {
            const res = await fetch(arquivo);
            const html = await res.text();
            container.innerHTML = html;
            
            // Executa scripts internos do módulo
            container.querySelectorAll('script').forEach(oldScript => {
                const newScript = document.createElement('script');
                newScript.text = oldScript.text;
                document.body.appendChild(newScript);
            });
        } catch (e) {
            container.innerHTML = "Erro ao carregar módulo.";
        }
    }

    function abrirPalpites(el) {
        if(!usuarioLogado) {
            alert("Acesse sua conta primeiro!");
            carregarModulo('login.html', document.querySelector('[onclick*="login.html"]'));
            return;
        }
        carregarModulo('palpites.html', el);
    }

    function atualizarMenuAtivo(el) {
        document.querySelectorAll('.icon-button').forEach(b => b.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function definirUsuario(dados) {
        usuarioLogado = dados;
        document.getElementById('user-display').innerText = `${dados.Apelido}`;
        document.getElementById('welcome-message').classList.add('hidden');
        document.getElementById('modulo-container').innerHTML = `<p class="text-center text-[var(--accent)] font-bold">Login realizado!</p>`;
    }
      async function enviarPing() {
            if (!usuarioLogado?.Apelido) return;
            try {
                await fetch('/api/ping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apelido: usuarioLogado.Apelido })
                });
            } catch (e) { console.error("Erro ping:", e); }
        }

// --- 1. Função para carregar o Ranking ---
async function inicializarRankingFixo() {
    try {
        const res = await fetch('ranking.html');
        if (!res.ok) throw new Error('Ranking não encontrado');
        const html = await res.text();
        const container = document.getElementById('modulo-ranking-container');
        container.innerHTML = html;
        
        container.querySelectorAll('script').forEach(s => {
            const ns = document.createElement('script');
            ns.text = s.text;
            document.body.appendChild(ns);
        });
    } catch (e) { console.error("Erro ranking:", e); }
}

// --- 2. Função para carregar o Chat ---
async function inicializarChatFixo() {
    try {
        const res = await fetch('chat.html');
        if (!res.ok) throw new Error('Chat não encontrado');
        const html = await res.text();
        const container = document.getElementById('container-chat-fixo');
        container.innerHTML = html;
        
        container.querySelectorAll('script').forEach(s => {
            const ns = document.createElement('script');
            ns.text = s.text;
            document.body.appendChild(ns);
        });
    } catch (e) { console.error("Erro chat:", e); }
}

// --- 3. ÚNICO GATILHO DE INICIALIZAÇÃO ---
document.addEventListener('DOMContentLoaded', () => {
    // Carrega os módulos fixos
    inicializarRankingFixo(); 
    inicializarChatFixo();
    
    // Verifica se já existe um utilizador no localStorage para manter o Login
    const userSalvo = localStorage.getItem('userLogado');
    if (userSalvo) {
        usuarioLogado = JSON.parse(userSalvo);
        definirUsuario(usuarioLogado);
        setInterval(enviarPing, 30000); // Inicia o ping apenas se logado
    }

    // 2. Esconde a mensagem "SELECIONE UMA OPÇÃO"
    const welcome = document.getElementById('welcome-message');
    if (welcome) welcome.classList.add('hidden');

    // 3. Chama a função que já criámos para injetar o HTML e rodar os scripts
    carregarModulo('palpites.html', el);
}

});
</script>
</body>
</html>
