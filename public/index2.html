<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Angeli - Mobile V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1; /* Texto mais claro para melhor leitura */
            --accent: #ffc107;
            --border: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-size: 16px; /* Tamanho base aumentado */
        }

        .card-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
        }

        /* Menu em Grid Otimizado */
        .mobile-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 12px;
        }

        .menu-item {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.05);
            font-size: 1rem; /* Letras maiores */
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .menu-item i {
            font-size: 1.2rem; /* Ícones maiores */
        }

        .menu-item.active {
            color: var(--bg);
            background-color: var(--accent);
            border-color: var(--accent);
        }

        #conteudo-central {
            background-image: none !important; 
            background-color: var(--card-bg);
            min-height: 300px;
            font-size: 1.1rem;
        }

        h1 { font-size: 1.5rem !important; }
        h2 { font-size: 1.2rem !important; }
    </style>
</head>
<body class="antialiased">

<header class="w-full pt-8 px-4 bg-[var(--bg)] text-center">
    <h1 class="font-bold tracking-tight uppercase m-0 text-[var(--accent)]">BOLÃO DO ANGELI</h1>
    <div id="user-display" class="text-white text-sm font-bold mt-2 uppercase bg-slate-800 inline-block px-4 py-1 rounded-full">
        Visitante
    </div>
</header>

<nav class="w-full mt-4">
    <div class="mobile-menu-grid">
        <button onclick="carregarModulo('login.html', this)" class="menu-item active">
            <i class="fas fa-user-circle"></i> Login
        </button>
        <button onclick="abrirPalpites(this)" class="menu-item">
            <i class="fas fa-futbol"></i> Palpites
        </button>
        <button onclick="carregarModulo('galera.html', this)" class="menu-item">
            <i class="fas fa-users"></i> Galera
        </button>
        <button onclick="carregarModulo('estatistica.html', this)" class="menu-item">
            <i class="fas fa-chart-bar"></i> Stats
        </button>
        <button onclick="limparCentro(this)" class="menu-item col-span-2">
            <i class="fas fa-file-alt"></i> Regulamento
        </button>
    </div>
</nav>

<main class="flex flex-col gap-6 p-4">
    <div id="conteudo-central" class="card-panel p-6 flex flex-col items-center justify-start shadow-xl">
        <p class="text-[var(--text-secondary)] italic mt-10">Escolha uma opção no menu</p>
    </div>

    <div id="modulo-ranking-container" class="w-full">
        <div class="text-center py-4 text-sm">Carregando Ranking...</div>
    </div>

    <section class="card-panel p-4 flex flex-col min-h-[450px]">
        <div class="flex items-center gap-3 mb-4 border-b border-[var(--border)] pb-3">
           <i class="fas fa-comments text-[var(--accent)] fa-lg"></i>
           <h2 class="font-bold uppercase text-[var(--accent)]">Zoação</h2>
        </div>
        <div id="container-chat-fixo" class="flex-grow flex flex-col">
            <div class="text-center text-sm text-[var(--text-secondary)] py-10">Carregando chat...</div>
        </div>
    </section>

    <button onclick="sairSistema()" class="w-full p-4 rounded-xl bg-red-900/40 text-red-200 border border-red-800 font-bold mb-10">
        <i class="fas fa-sign-out-alt mr-2"></i> SAIR DO SISTEMA
    </button>
</main>

<footer class="w-full py-8 px-4 border-t border-[var(--border)] bg-[var(--bg)] text-center mb-4">
    <p class="text-[var(--text-secondary)]">&copy; 2026 Bolão do Angeli</p>
</footer>

<script>
    let usuarioLogado = null;

    // Função genérica para injetar HTML e executar scripts (essencial para o Ranking aparecer)
    function injetarConteudo(containerId, html) {
        const container = document.getElementById(containerId);
        container.innerHTML = html;
        const scripts = container.querySelectorAll("script");
        scripts.forEach(oldScript => {
            const newScript = document.createElement("script");
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });
    }

    async function carregarModulo(arquivo, el) {
        atualizarMenuAtivo(el);
        const centro = document.getElementById('conteudo-central');
        centro.innerHTML = '<div class="py-20 text-lg">Carregando conteúdo...</div>';
        
        try {
            const response = await fetch(`${arquivo}?v=${new Date().getTime()}`);
            if (!response.ok) throw new Error(`Erro ao buscar arquivo`);
            const html = await response.text();
            injetarConteudo('conteudo-central', html);
            centro.scrollIntoView({ behavior: 'smooth' });
        } catch (e) {
            centro.innerHTML = `<div class="text-red-500 p-4">Erro: ${arquivo} não encontrado.</div>`;
        }
    }

    async function inicializarRankingFixo() {
        try {
            const res = await fetch('ranking.html');
            if (res.ok) {
                const html = await res.text();
                injetarConteudo('modulo-ranking-container', html);
            }
        } catch (e) { console.error("Erro ranking:", e); }
    }

    async function inicializarChatFixo() {
        try {
            const res = await fetch('chat.html');
            if (res.ok) {
                const html = await res.text();
                injetarConteudo('container-chat-fixo', html);
            }
        } catch (e) { console.error("Erro chat:", e); }
    }

    function limparCentro(el) {
        atualizarMenuAtivo(el);
        document.getElementById('conteudo-central').innerHTML = '<div class="p-4"><h2>Regulamento</h2><p class="mt-4">As regras do bolão aparecerão aqui.</p></div>'; 
    }

    function abrirPalpites(el) {
        if(!usuarioLogado) {
            alert("Faça login primeiro!");
            carregarModulo('login.html', document.querySelector('[onclick*="login.html"]'));
            return;
        }
        carregarModulo('palpites.html', el);
    }

    function atualizarMenuAtivo(el) {
        document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function definirUsuario(dados) {
        usuarioLogado = dados;
        document.getElementById('user-display').innerText = usuarioLogado.Apelido;
    }

    function sairSistema() {
        localStorage.removeItem('userLogado'); 
        window.location.href = 'sair.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        inicializarRankingFixo();
        inicializarChatFixo();
    });
</script>
</body>
</html>
