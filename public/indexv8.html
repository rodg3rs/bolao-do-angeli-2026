<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Angeli 2026 - Mobile V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.95);
            --accent: #ffc107;
            --border: rgba(255, 255, 255, 0.1);
        }

        .hidden { display: none !important; }

        html { font-size: 24px; }

/* --- FORÇA O AUMENTO DA FONTE NOS MÓDULOS INJETADOS --- */
#modulo-container p,
#modulo-container label,
#modulo-container td,
#modulo-container th,
#modulo-container div {
    font-size: 1.2rem !important; /* Ajuste este valor (1.2, 1.4, etc) para ficar ideal no celular */
    line-height: 1.6 !important;  /* Melhora o espaçamento entre as linhas para leitura */
}

/* Aumenta especificamente campos de digitação e botões */
#modulo-container input,
#modulo-container select,
#modulo-container button {
    font-size: 1.3rem !important;
    padding: 0.8rem !important;   /* Deixa os botões e campos mais "gordinhos" para tocar com o dedo */
}

/* Aumenta os títulos dentro dos módulos */
#modulo-container h1,
#modulo-container h2,
#modulo-container h3,
#modulo-container h4 {
    font-size: 1.6rem !important;
}

/* Protege os ícones para que não fiquem gigantes e quebrem o layout */
#modulo-container i,
#modulo-container .fas,
#modulo-container .far {
    font-size: inherit !important;
}

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.95)), 
                              url('/img/copa2026.png');
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            color: #ffffff;
            margin: 0;
            display: flex;
            min-height: 100vh;
            font-family: sans-serif;
        }

        /* Sidebar Mobile Larga */
        .sidebar {
            width: 120px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .nav-item {
            width: 100%;
            padding: 35px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-item i { font-size: 1.8rem; }
        .nav-item span { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); background: rgba(255, 193, 7, 0.05); }

        main { flex: 1; padding: 25px; display: flex; flex-direction: column; gap: 30px; }

        /* Estilo das mensagens do chat */
        .chat-bubble {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid var(--accent);
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="mb-10 text-[var(--accent)]" onclick="mostrarHome()" style="cursor:pointer">
            <i class="fas fa-trophy text-4xl"></i>
        </div>

        <button onclick="carregarModulo('login.html', this)" class="nav-item">
            <i class="far fa-user-circle"></i>
            <span>Login</span>
        </button>

        <button onclick="abrirPalpites(this)" class="nav-item">
            <i class="far fa-edit"></i>
            <span>Palpites</span>
        </button>

        <button onclick="carregarModulo('galera.html', this)" class="nav-item">
            <i class="fas fa-users"></i>
            <span>Galera</span>
        </button>

        <button onclick="carregarModulo('estatistica.html', this)" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Stats</span>
        </button>
        
        <button onclick="sairSistema()" class="nav-item text-red-400">
            <i class="fas fa-sign-out-alt"></i>
            <span>Sair</span>
        </button>
    </nav>

    <main>
        <header class="text-left mb-4">
            <h1 class="text-5xl font-black text-[var(--accent)] leading-tight uppercase" onclick="mostrarHome()" style="cursor:pointer">
                Bolão do Angeli 2026
            </h1>
            <div id="user-display" class="text-3xl font-extrabold uppercase mt-2 text-slate-400">
                Visitante
            </div>
        </header>

        <div id="conteudo-central" class="hidden">
            <div id="modulo-container" class="bg-slate-800/40 rounded-3xl p-6 border border-white/10 shadow-2xl">
                </div>
        </div>

        <div id="welcome-message" class="text-center py-10">
            <p class="font-black text-[var(--accent)] text-3xl">BOA SORTE NA ZOAÇÃO!</p>
        </div>

        <div id="home-containers" class="flex flex-col gap-8">
            
            <section id="modulo-ranking-container" class="bg-slate-800/30 rounded-2xl p-6 border border-white/5">
                </section>

            <section id="container-chat-fixo" class="bg-slate-800/30 rounded-2xl p-6 border border-white/5 flex flex-col min-h-[500px]">
                <div class="sticky top-0 bg-[#0f172a] z-10 pb-4 border-b border-white/10 mb-6">
                    <h2 class="text-3xl font-black text-[var(--accent)] flex items-center gap-3">
                        <i class="far fa-comments"></i> ZOAÇÃO
                    </h2>
                </div>
                
                <div id="chat-messages" class="flex-1 overflow-y-auto mb-6 space-y-4 max-h-[500px]">
                    <p class="text-center text-slate-500">Conectando ao chat...</p>
                </div>

                <div class="flex gap-3 pt-4 border-t border-white/5">
                    <input type="text" id="chat-input" 
                           class="flex-1 bg-slate-900 border border-white/10 rounded-xl px-5 py-4 text-xl text-white outline-none focus:border-[var(--accent)]" 
                           placeholder="Mande sua zoeira...">
                    <button onclick="enviarMensagemChat()" 
                            class="bg-[var(--accent)] text-slate-900 px-8 py-4 rounded-xl font-black text-2xl active:scale-95 transition-all">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <script>
        let usuarioLogado = null;

        // --- NAVEGAÇÃO E CARREGAMENTO ---

        async function carregarModulo(url, el) {
            const container = document.getElementById('modulo-container');
            const conteudoCentral = document.getElementById('conteudo-central');
            const welcome = document.getElementById('welcome-message');
            const homeContainers = document.getElementById('home-containers');

            try {
                // Esconde Home (Ranking/Chat) e mostra Container de Módulo
                homeContainers.classList.add('hidden');
                welcome.classList.add('hidden');
                conteudoCentral.classList.remove('hidden');

                const res = await fetch(url);
                const html = await res.text();
                container.innerHTML = html;

                // Re-executa scripts do módulo carregado
                container.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                atualizarMenuAtivo(el);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) {
                console.error("Erro ao carregar módulo:", e);
            }
        }

        function abrirPalpites(el) {
            if (!usuarioLogado) {
                alert("Acesse sua conta primeiro!");
                carregarModulo('login.html', document.querySelector('.nav-item i.fa-user-circle').parentElement);
                return;
            }
            carregarModulo('palpites.html', el);
        }

        function mostrarHome() {
            document.getElementById('conteudo-central').classList.add('hidden');
            document.getElementById('home-containers').classList.remove('hidden');
            document.getElementById('welcome-message').classList.remove('hidden');
            atualizarMenuAtivo(null);
            inicializarRankingFixo();
            inicializarChatFixo();
        }

        function atualizarMenuAtivo(el) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        // --- DADOS DO SERVIDOR (RANKING E CHAT) ---

        async function inicializarRankingFixo() {
            const container = document.getElementById('modulo-ranking-container');
            try {
                const res = await fetch('/api/ranking');
                const data = await res.json();
                if (data.success) {
                    let html = `
                        <h2 class="text-3xl font-black text-[var(--accent)] mb-6 flex items-center gap-3">
                            <i class="fas fa-trophy"></i> RANKING
                        </h2>
                        <table class="w-full text-left">
                            <thead class="text-slate-400 text-sm uppercase">
                                <tr class="border-b border-white/10">
                                    <th class="pb-3">Pos</th>
                                    <th class="pb-3">Nome</th>
                                    <th class="pb-3 text-right">Pts</th>
                                </tr>
                            </thead>
                            <tbody>`;
                    
                    data.ranking.forEach((u, i) => {
                        const status = u.Online ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-slate-600';
                        html += `
                            <tr class="border-b border-white/5">
                                <td class="py-4 font-bold text-slate-500">${i+1}º</td>
                                <td class="py-4 flex items-center gap-3">
                                    <span class="w-3 h-3 rounded-full ${status}"></span>
                                    <span class="font-black text-xl uppercase">${u.Apelido}</span>
                                </td>
                                <td class="py-4 text-right font-black text-3xl text-[var(--accent)]">${u.Total}</td>
                            </tr>`;
                    });
                    container.innerHTML = html + `</tbody></table>`;
                }
            } catch (e) { console.error("Ranking offline"); }
        }

        async function inicializarChatFixo() {
            const container = document.getElementById('chat-messages');
            try {
                const res = await fetch('/get-chat');
                const data = await res.json();
                if (data.success) {
                    container.innerHTML = data.mensagens.map(m => `
                        <div class="chat-bubble">
                            <span class="block text-xs font-black text-[var(--accent)] uppercase mb-1">${m.Apelido}</span>
                            <p class="text-xl font-medium text-slate-200">${m.Mensagem}</p>
                        </div>
                    `).join('');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) { }
        }

        async function enviarMensagemChat() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim() || !usuarioLogado) return;
            try {
                await fetch('/enviar-msg', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apelido: usuarioLogado.Apelido, mensagem: input.value })
                });
                input.value = '';
                inicializarChatFixo();
            } catch (e) { }
        }

        // --- SISTEMA ---

        function definirUsuario(dados) {
            usuarioLogado = dados;
            document.getElementById('user-display').innerText = dados.Apelido;
            document.getElementById('user-display').classList.replace('text-slate-400', 'text-[var(--accent)]');
        }

        function sairSistema() {
            localStorage.clear();
            window.location.href = 'sair.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            inicializarRankingFixo();
            inicializarChatFixo();
            
            const user = localStorage.getItem('userLogado');
            if (user) definirUsuario(JSON.parse(user));

            setInterval(inicializarRankingFixo, 40000);
            setInterval(inicializarChatFixo, 6000);

            document.getElementById('chat-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') enviarMensagemChat();
            });
        });
    </script>
</body>
</html>
