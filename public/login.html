<style>
    /* Estilos específicos do Card de Autenticação */
    .auth-card { 
        background: var(--panel); 
        padding: 40px; 
        border-radius: 16px; 
        width: 100%; 
        max-width: 450px; 
        border: 1px solid var(--border); 
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .auth-tabs { display: flex; margin-bottom: 30px; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 5px; }
    .auth-tab { 
        flex: 1; 
        padding: 12px; 
        text-align: center; 
        cursor: pointer; 
        color: white; 
        font-weight: 600; 
        transition: 0.3s; 
        border-radius: 6px;
    }
    .auth-tab.active { 
        color: var(--bg); 
        background: var(--accent); 
    }
    
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 0.75rem; color: white; text-transform: uppercase; font-weight: bold; }
    
    .auth-form input { 
        padding: 14px; 
        border-radius: 8px; 
        border: 1px solid var(--border); 
        background: var(--bg); 
        color: white; 
        font-size: 1rem;
        transition: 0.3s;
    }
    .auth-form input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255, 193, 7, 0.2); outline: none; }
    
    .auth-form button { 
        padding: 16px; 
        border-radius: 8px; 
        border: none; 
        background: var(--accent); 
        color: var(--bg); 
        font-weight: 800; 
        cursor: pointer; 
        font-size: 1rem; 
        text-transform: uppercase;
        margin-top: 10px;
        transition: 0.3s; 
    }
    .auth-form button:hover { transform: scale(1.02); filter: brightness(1.1); }
    .btn-reg { background: var(--success) !important; color: white !important; }

    .voucher-info {
        font-size: 0.7rem;
        color: #64748b;
        text-align: center;
        margin-top: 10px;
    }
</style>

<div class="auth-card">
    <div class="auth-tabs">
        <div id="tab-entrar" class="auth-tab active" onclick="alternarAuth('entrar')">Entrar</div>
        <div id="tab-cadastrar" class="auth-tab" onclick="alternarAuth('cadastrar')">Cadastrar</div>
    </div>

    <div id="form-entrar">
        <form class="auth-form" onsubmit="realizarLogin(event)">
            <div class="input-group">
                <label>Apelido</label>
                <input type="text" id="login-apelido" placeholder="Ex: Artilheiro10" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="login-senha" placeholder="••••••••" required>
            </div>
            <button type="submit">Acessar Arena</button>
        </form>
    </div>

    <div id="form-cadastrar" style="display: none;">
        <form class="auth-form" onsubmit="realizarCadastro(event)">
            <div class="input-group">
                <label>CPF (Identificador único)</label>
                <input type="text" id="reg-cpf" placeholder="000.000.000-00" 
                       oninput="aplicarMascaraCPF(this)" maxlength="14" required>
            </div>
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="reg-nome" placeholder="Seu nome real" required>
            </div>
            <div class="input-group">
                <label>Apelido no Ranking</label>
                <input type="text" id="reg-apelido" placeholder="Como os outros te verão" required>
            </div>
            <div class="input-group">
                <label>Senha (Mín. 6 caracteres)</label>
                <input type="password" id="reg-senha" placeholder="Crie uma senha forte" required minlength="6">
            </div>
            <div class="input-group">
                <label>Time do Coração</label>
                <input type="text" id="reg-time" placeholder="Ex: Palmeiras" required>
            </div>

<div class="input-group">
    <label># Celular</label>
    <input type="text" id="reg-celular" placeholder="(99) 99999-9999" 
           oninput="aplicarMascaraCelular(this)" maxlength="15">
</div>
<div class="input-group">
    <label>E-mail</label>
    <input type="email" id="reg-email" placeholder="seu@email.com" required>
</div>

            <button type="submit" class="btn-reg">Criar Minha Conta</button>
            <p class="voucher-info">Seu CPF será seu ID único no sistema.</p>
        </form>
    </div>
</div>

<script>
    // --- FUNÇÕES DE VALIDAÇÃO DE CPF ---
    function aplicarMascaraCPF(i) {
        let v = i.value.replace(/\D/g, ""); // Remove tudo que não é dígito
        if (v.length > 11) v = v.substring(0, 11);
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        i.value = v;
    }

    function validarCPF(cpf) {
        cpf = cpf.replace(/[^\d]+/g, ''); // Limpa a formatação
        if (cpf.length !== 11 || !!cpf.match(/(\d)\1{10}/)) return false;
        let cpfs = cpf.split('').map(el => +el);
        const rest = (count) => (cpfs.slice(0, count-12).reduce((soma, el, i) => soma + el * (count - i), 0) * 10) % 11 % 10;
        return rest(10) === cpfs[9] && rest(11) === cpfs[10];
    }

    function alternarAuth(tipo) {
        const tabE = document.getElementById('tab-entrar'), tabC = document.getElementById('tab-cadastrar');
        const formE = document.getElementById('form-entrar'), formC = document.getElementById('form-cadastrar');
        if (tipo === 'entrar') {
            tabE.classList.add('active'); tabC.classList.remove('active');
            formE.style.display = 'block'; formC.style.display = 'none';
        } else {
            tabC.classList.add('active'); tabE.classList.remove('active');
            formC.style.display = 'block'; formE.style.display = 'none';
        }

// 1. Adicione esta nova função de máscara
function aplicarMascaraCelular(i) {
    let v = i.value.replace(/\D/g, ""); 
    if (v.length > 11) v = v.substring(0, 11);
    v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
    v = v.replace(/(\d{5})(\d)/, "$1-$2");
    i.value = v;
}

    }

    async function realizarCadastro(event) {
        event.preventDefault();

        const campoCpf = document.getElementById('reg-cpf').value;
        
        // Validação do CPF antes de enviar ao servidor
        if (!validarCPF(campoCpf)) {
            alert("CPF inválido! Por favor, verifique os números digitados.");
            return;
        }

// Formatação do celular para o padrão solicitado: 55999999999@c.us
    let celularLimpo = document.getElementById('reg-celular').value.replace(/\D/g, "");
    let celularFormatado = celularLimpo ? `55${celularLimpo}@c.us` : "";


        const dados = {
            id: campoCpf.replace(/[^\d]+/g, ''), // Envia apenas os 11 dígitos limpos
            nome: document.getElementById('reg-nome').value,
            apelido: document.getElementById('reg-apelido').value,
            senha: document.getElementById('reg-senha').value,
            time: document.getElementById('reg-time').value,
	    celular: celularFormatado, // Novo campo
            email: document.getElementById('reg-email').value // Novo campo
        };

        try {
            const res = await fetch('/cadastrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            const result = await res.json();
            
            if(result.success) {
                alert("Sucesso! Cadastro realizado e apostas geradas.");
                alternarAuth('entrar');
            } else {
                alert("Falha no cadastro: " + result.message);
            }
        } catch (e) { 
            alert("Erro de conexão. Verifique se o servidor está rodando."); 
        }
    }

    async function realizarLogin(event) {
        event.preventDefault();
        const dados = {
            apelido: document.getElementById('login-apelido').value,
            senha: document.getElementById('login-senha').value
        };

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            const result = await res.json();
            
            if(result.success) {
                // Comunica ao index.html (Pai) a mudança de estado imediatamente sem alert
                if (typeof definirUsuario === "function") {
                    definirUsuario(result.user); 
                }
            } else { 
                alert("Acesso negado: " + result.message); 
            }
        } catch (e) { 
            alert("Erro ao tentar logar."); 
        }
    }
</script>
