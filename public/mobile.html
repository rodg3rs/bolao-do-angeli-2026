<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bolão do Angeli 2026 - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS ORIGINAL PRESERVADO DO INDEXV8.HTML --- */
        :root {
            --bg: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.95);
            --accent: #ffc107;
            --border: rgba(255, 255, 255, 0.1);
        }

        .hidden { display: none !important; }

        html { font-size: 24px; }

        /* --- FORÇA O AUMENTO DA FONTE NOS MÓDULOS INJETADOS --- */
        #modulo-container p, #modulo-container label, #modulo-container td,
        #modulo-container th, #modulo-container div {
            font-size: 1.2rem !important;
            line-height: 1.6 !important;
        }

        #modulo-container input, #modulo-container select, #modulo-container button {
            font-size: 1.3rem !important;
            padding: 0.8rem !important;
        }

        #modulo-container h1, #modulo-container h2, #modulo-container h3, #modulo-container h4 {
            font-size: 1.6rem !important;
        }

        #modulo-container i, #modulo-container .fas, #modulo-container .far {
            font-size: inherit !important;
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.95)), 
                              url('/img/copa2026.png');
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden; /* Impede scroll no body para travar header/footer */
        }

        /* Estilo das mensagens do chat */
        .chat-bubble {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid var(--accent);
        }

        /* --- ADAPTAÇÃO PARA LAYOUT FIXO MOBILE --- */

        /* Header Fixo no Topo */
        header.fixed-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: auto;
            background: var(--bg);
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        /* Menu Fixo no Bottom (Estilo Sidebar Original) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 110px;
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        /* Botões do Menu (Mantendo estilo .nav-item original) */
        .nav-item {
            flex: 1;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #94a3b8;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-item i { font-size: 1.8rem; }
        .nav-item span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); background: rgba(255, 193, 7, 0.05); }

        /* Área Central de Scroll */
        main {
            flex: 1;
            overflow-y: auto;
            margin-top: 150px; /* Espaço do Header */
            margin-bottom: 120px; /* Espaço do Menu Bottom */
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* --- CHAT TIPO CORTINA (GAVETA) --- */
        #container-chat-fixo {
            position: fixed;
            bottom: -80vh; /* Escondido */
            left: 0;
            right: 0;
            height: 75vh;
            background: #1e293b;
            z-index: 2000;
            transition: bottom 0.5s ease-in-out;
            border-radius: 30px 30px 0 0;
            border-top: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
        }

        #container-chat-fixo.aberto {
            bottom: 110px; /* Abre logo acima do menu inferior */
        }

        .chat-drag-handle {
            width: 60px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin: 15px auto;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Header Fixo Topo -->
    <header class="fixed-top">
        <h1 class="text-4xl font-black text-center leading-tight uppercase" onclick="mostrarHome()" style="cursor:pointer">
            Bolão do Angeli 2026
        </h1>
        <div id="user-display" class="text-2xl text-center font-extrabold uppercase mt-1 text-slate-400">
            Visitante
        </div>
    </header>

    <main id="scroll-area">
        <!-- Container de Módulos (Login, Palpites, etc) -->
        <div id="conteudo-central" class="hidden">
            <div id="modulo-container" class="bg-slate-800/40 rounded-3xl p-6 border border-white/10 shadow-2xl">
            </div>
        </div>

        <!-- Conteúdo Home (Ranking) -->
        <div id="home-containers" class="flex flex-col gap-8">
            <section id="modulo-ranking-container" class="bg-slate-800/30 rounded-2xl p-6 border border-white/5">
                <!-- Ranking será injetado aqui -->
            </section>
        </div>
    </main>

    <!-- Chat Cortina (Zoação) -->
    <div id="container-chat-fixo">
        <div class="chat-drag-handle" onclick="toggleChat()"></div>
        <div class="px-6 pb-4 border-b border-white/10 mb-2">
            <h2 class="text-3xl font-black text-[var(--accent)] flex items-center justify-between">
                <span><i class="far fa-comments"></i> ZOAÇÃO</span>
                <button onclick="toggleChat()"><i class="fas fa-chevron-down text-lg"></i></button>
            </h2>
        </div>
        
        <div id="chat-messages" class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
            <!-- Mensagens injetadas aqui -->
        </div>

        <div class="p-6 bg-slate-900 border-t border-white/10 flex gap-3">
            <input type="text" id="chat-input" 
                   class="flex-1 bg-slate-800 border border-white/10 rounded-xl px-5 py-4 text-xl text-white outline-none focus:border-[var(--accent)]" 
                   placeholder="Mande sua zoeira...">
            <button onclick="enviarMensagemChat()" 
                    class="bg-[var(--accent)] text-slate-900 px-6 py-4 rounded-xl font-black text-2xl active:scale-95 transition-all">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Menu Fixo Bottom -->
    <nav class="bottom-nav">

        <button onclick="carregarModulo('login.html', this)" class="nav-item">
            <i class="far fa-user-circle"></i>
            <span>Login</span>
        </button>

        <button onclick="abrirPalpites(this)" class="nav-item">
            <i class="far fa-edit"></i>
            <span>Palpites</span>
        </button>

        <button onclick="carregarModulo('galera.html', this)" class="nav-item">
            <i class="fas fa-users"></i>
            <span>Galera</span>
        </button>

        <button onclick="carregarModulo('estatistica.html', this)" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Stats</span>
        </button>

        <button onclick="toggleChat()" class="nav-item">
            <i class="fas fa-comments"></i>
            <span>Chat</span>
        </button>
 
        <button onclick="carregarModulo('admin.html', this)" class="nav-item">
            <i class="fas fa-cogs"></i>
	    <span>Admin</span>
        </button>
       
	<button onclick="limparCentro(this)" class="nav-item">
            <i class="fas fa-file-alt"></i> 
	    <span>Regulamento</span>
        </button>

        <button onclick="sairSistema()" class="nav-item text-red-400">
            <i class="fas fa-sign-out-alt"></i>
            <span>Sair</span>
        </button>
    </nav>

    <script>
        let usuarioLogado = null;

        // Controle da Cortina do Chat
        function toggleChat() {
            const chat = document.getElementById('container-chat-fixo');
            chat.classList.toggle('aberto');
        }

        // --- FUNÇÕES DE CARREGAMENTO (MANTIDAS DO INDEXV8) ---

	async function carregarModulo(url, el) {
	    // Se o botão clicado já estiver ativo, ele funciona como um "toggle" para voltar ao Ranking
	    if (el && el.classList.contains('active')) {
 	       mostrarHome();
	        return;
	    }            
	    const container = document.getElementById('modulo-container');
            const conteudoCentral = document.getElementById('conteudo-central');
            const welcome = document.getElementById('welcome-message');
            const homeContainers = document.getElementById('home-containers');
            
            // Fecha chat se abrir outro módulo
            document.getElementById('container-chat-fixo').classList.remove('aberto');

            try {
                homeContainers.classList.add('hidden');
                if (welcome) welcome.classList.add('hidden');
                conteudoCentral.classList.remove('hidden');
		conteudoCentral.style.display = 'block';

                const res = await fetch(url);
		if (!res.ok) throw new Error('Erro ao carregar arquivo');
                const html = await res.text();
                container.innerHTML = html;

                // Executa scripts do módulo
                container.querySelectorAll('script').forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                atualizarMenuAtivo(el);
                document.getElementById('scroll-area').scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) { 
		console.error("Erro ao carregar módulo:", e);
		container.innerHTML = `<p class="p-4 text-red-500">Erro ao carregar conteúdo. Verifique se o arquivo ${url} existe.</p>`;
	    }
        }

        function abrirPalpites(el) {
            if (!usuarioLogado) {
                alert("Acesse sua conta primeiro!");
		const loginBtn = document.querySelector('button[onclick*="login.html"]');
                carregarModulo('login.html', loginBtn);
                return;
            }
            carregarModulo('palpites.html', el);
        }

function mostrarHome() {
    // 1. Esconde o container onde os módulos (Login, Palpites, etc) são carregados
    document.getElementById('conteudo-central').classList.add('hidden');
    
    // 2. Garante que o Ranking (home-containers) volte a ficar visível
    document.getElementById('home-containers').classList.remove('hidden');
    
    // 3. Opcional: Se houver mensagem de boas-vindas, mostre-a também
    const welcome = document.getElementById('welcome-message');
    if (welcome) welcome.classList.remove('hidden');

    // 4. Desmarca qualquer botão ativo no menu inferior para mostrar que saiu daquele módulo
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    
    // 5. Fecha a cortina do chat para não cobrir o ranking
    document.getElementById('container-chat-fixo').classList.remove('aberto');

    // 6. Atualiza os dados do ranking em tempo real
    inicializarRankingFixo();
    
    // 7. Volta o scroll para o topo para ver o início do ranking
    document.getElementById('scroll-area').scrollTop = 0;
}

        function atualizarMenuAtivo(el) {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        // --- LOGICA DE DADOS (RANKING E CHAT) ---

        async function inicializarRankingFixo() {
            const container = document.getElementById('modulo-ranking-container');
            try {
                const res = await fetch('/api/ranking');
                const data = await res.json();
                if (data.success) {
                    let html = `<h2 class="text-3xl font-black text-[var(--accent)] mb-6 flex items-center gap-3">
                                <i class="fas fa-trophy"></i> RANKING</h2>
                                <table class="w-full text-left">
                                <thead class="text-slate-400 text-sm uppercase">
                                <tr class="border-b border-white/10">
                                <th class="pb-3">Pos</th><th class="pb-3">Nome</th><th class="pb-3 text-right">Pts</th>
                                </tr></thead><tbody>`;
                    data.ranking.forEach((u, i) => {
                        const status = u.Online ? 'bg-green-500 shadow-[0_0_10px_#22c55e]' : 'bg-slate-600';
                        html += `<tr class="border-b border-white/5">
                                <td class="py-4 font-bold text-slate-500">${i+1}º</td>
                                <td class="py-4 flex items-center gap-3">
                                    <span class="w-3 h-3 rounded-full ${status}"></span>
                                    <span class="font-black text-xl uppercase">${u.Apelido}</span>
                                </td>
                                <td class="py-4 text-right font-black text-3xl text-[var(--accent)]">${u.Total}</td>
                                </tr>`;
                    });
                    container.innerHTML = html + `</tbody></table>`;
                }
            } catch (e) { console.error("Ranking offline"); }
        }

        async function inicializarChatFixo() {
            const container = document.getElementById('chat-messages');
            try {
                const res = await fetch('/get-chat');
                const data = await res.json();
                if (data.success) {
                    container.innerHTML = data.mensagens.map(m => `
                        <div class="chat-bubble">
                            <span class="block text-xs font-black text-[var(--accent)] uppercase mb-1">${m.Apelido}</span>
                            <p class="text-xl font-medium text-slate-200">${m.Mensagem}</p>
                        </div>
                    `).join('');
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) { }
        }

        async function enviarMensagemChat() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim() || !usuarioLogado) return;
            try {
                await fetch('/enviar-msg', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apelido: usuarioLogado.Apelido, mensagem: input.value })
                });
                input.value = '';
                inicializarChatFixo();
            } catch (e) { }
        }

        function sairSistema() { localStorage.clear(); window.location.href = 'sair.html'; }

        document.addEventListener('DOMContentLoaded', () => {
            inicializarRankingFixo();
            inicializarChatFixo();
            const user = localStorage.getItem('userLogado');
            if (user) {
                usuarioLogado = JSON.parse(user);
                document.getElementById('user-display').innerText = usuarioLogado.Apelido;
                document.getElementById('user-display').style.color = 'var(--accent)';
            }
            setInterval(inicializarRankingFixo, 40000);
            setInterval(inicializarChatFixo, 6000);
        });
    </script>
</body>
</html>
