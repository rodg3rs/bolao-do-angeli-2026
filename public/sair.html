<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Até logo!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Roboto:ital,wght@1,400&family=Montserrat:ital,wght@1,500&display=swap" rel="stylesheet">
    
    <style>
        /* CSS unificado do teste-sair.html */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: sans-serif;
            background-color: #0f172a;
        }

        .background-full {
            height: 100vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            display: flex;
            /* Alinhado à esquerda conforme seu teste */
            justify-content: flex-start; 
            align-items: flex-start;
            transition: background-image 0.5s ease-in-out;
        }

        .container-mensagens {
            margin-top: 20px;
            margin-left: 20px;
            width: 320px;
            background: rgba(15, 23, 42, 0.8); 
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .frase {
            display: block;
            margin-bottom: 15px;
            font-style: italic;
        }

        .en { font-family: 'Roboto', sans-serif; font-size: 1.4rem; color: #ffffff; }
        .es { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #ffc107; }
        .fr { font-family: 'Montserrat', sans-serif; font-size: 1.3rem; color: #f1f5f9; }

        .sub-texto {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }

        .btn-voltar {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: transparent; 
            color: #ffc107;
            text-decoration: none;
            border: none; 
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .btn-voltar:hover {
            transform: scale(1.1); 
        }
    </style>
</head>
<body onload="escolherFundoAleatorio()">

    <div id="tela-saida" class="background-full">
        <div class="container-mensagens">
            <span class="frase en">Thanks for participating!</span>
            <span class="frase es">¡Gracias por participar!</span>
            <span class="frase fr">Merci de votre participation !</span>
            
            <p class="sub-texto">Até mais!</p>
            
            <a href="index.html" class="btn-voltar">Entrar Novamente</a>
        </div>
    </div>

    <script>
        // Mantida a lógica original do seu sair.html para o sorteio de imagens
        function escolherFundoAleatorio() {
    	const total = 4;
    	const num = Math.floor(Math.random() * total) + 1;
    	const path = `img/fut-${num}.webp`;
    
    	const elemento = document.getElementById('tela-saida');
    
    	// Aplica o gradiente e a imagem
    	elemento.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('${path}')`;
    
    	// GARANTE O ENCAIXE AQUI:
    	elemento.style.backgroundSize = "cover"; // Ou "contain" se quiser ver a foto toda sem cortes
    	elemento.style.backgroundPosition = "center"; // Mantém o foco no meio da foto
    	elemento.style.backgroundRepeat = "no-repeat"; // Não deixa a imagem repetir como um mosaico
	}
    </script>
</body>
</html>
