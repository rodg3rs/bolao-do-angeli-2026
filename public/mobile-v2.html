<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Bolão do Angeli 2026 - Mobile</title>

  <!-- UI libs (mesmas do index para consistência) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --accent: #ffc107;
      --muted: #94a3b8;
      --border: #334155;
    }
    html { font-size: 20px; }
    body {
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(rgba(15,23,42,.95),rgba(15,23,42,.95)), url('/img/copa2026.png') center / cover no-repeat;
      color: #fff;
      height:100vh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    header.mobile-top {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      background: rgba(15,23,42,0.9); border-bottom:1px solid var(--border);
      padding:14px 16px; display:flex; flex-direction:column; gap:6px; align-items:center;
    }
    header.mobile-top h1 { margin:0; font-weight:900; font-size:1.25rem; cursor:pointer; text-transform:uppercase; letter-spacing:.6px; }
    #user-display { color: var(--accent); font-weight:700; font-size:.95rem; opacity:.95; }

    main {
      margin-top:120px; margin-bottom:120px; overflow:auto; flex:1; padding:12px;
    }

    /* Container dos módulos injetados */
    #conteudo-central { display:none; }
    #modulo-container {
      background: rgba(30,41,59,0.45);
      border-radius:12px; border:1px solid rgba(255,255,255,0.06);
      padding:10px; width:100%; box-sizing:border-box;
    }

    /* Ranking Home */
    #modulo-ranking-container {
      background: rgba(30,41,59,0.25);
      border-radius:12px; padding:12px; border:1px solid rgba(255,255,255,0.04);
    }

    /* Chat cortina */
    #container-chat-fixo {
      position:fixed; left:0; right:0; bottom:-80vh; height:75vh; z-index:1500;
      background:var(--panel); border-top:3px solid var(--accent); border-radius:18px 18px 0 0;
      transition: bottom .45s cubic-bezier(.2,.9,.2,1); display:flex; flex-direction:column; overflow:hidden;
    }
    #container-chat-fixo.aberto { bottom:110px; }
    .chat-drag-handle { height:6px; width:60px; background: rgba(255,255,255,0.12); margin:12px auto; border-radius:4px; cursor:pointer; }

    /* Bottom nav */
    .bottom-nav {
      position:fixed; left:0; right:0; bottom:0; height:110px; z-index:1000;
      background: rgba(30,41,59,0.9); border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-around; gap:8px; padding:10px 6px;
    }
    .nav-item {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      color: var(--muted); gap:6px; background:transparent; border-radius:12px; padding:8px 10px;
      border:none; cursor:pointer; width:64px;
    }
    .nav-item i { font-size:1.35rem; }
    .nav-item span { font-size:.6rem; font-weight:800; text-transform:uppercase; }
    .nav-item.active { color: var(--accent); background: rgba(255,193,7,0.06); }

    /* small helpers */
    .hidden { display:none !important; }
    .empty-state { text-align:center; color:#94a3b8; font-style:italic; padding:26px 0; }
  </style>
</head>
<body>

  <header class="mobile-top">
    <h1 onclick="mostrarHome()">BOLÃO DO ANGELI 2026</h1>
    <div id="user-display">Visitante</div>
  </header>

  <main id="main-area">
    <!-- Conteúdo Home (Ranking) -->
    <div id="home-containers">
      <section id="modulo-ranking-container">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
          <div style="display:flex; gap:12px; align-items:center;">
            <i class="fas fa-trophy" style="color:var(--accent)"></i>
            <h2 style="margin:0; font-weight:800; font-size:1rem; color:var(--accent)">Ranking</h2>
          </div>
          <div id="ranking-last" style="color:var(--muted); font-size:.8rem"></div>
        </div>
        <div id="lista-ranking" style="margin-top:12px;"></div>
      </section>
    </div>

    <!-- Container de módulos injetados -->
    <div id="conteudo-central">
      <div id="modulo-container"></div>
    </div>
  </main>

  <!-- Chat cortina -->
  <div id="container-chat-fixo" aria-hidden="true">
    <div class="chat-drag-handle" onclick="toggleChat()"></div>
    <div style="padding:14px; border-bottom:1px solid rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:space-between;">
      <div style="display:flex; gap:10px; align-items:center;"><i class="far fa-comments" style="color:var(--accent)"></i><strong style="color:var(--accent)">ZOAÇÃO</strong></div>
      <button onclick="toggleChat()" style="background:transparent; border:none; color:var(--muted); font-size:18px"><i class="fas fa-chevron-down"></i></button>
    </div>

    <div id="chat-messages" style="padding:12px; overflow:auto; flex:1; display:flex; flex-direction:column; gap:10px;">
      <div class="empty-state">Carregando chat...</div>
    </div>

    <div style="padding:12px; border-top:1px solid rgba(255,255,255,0.03); display:flex; gap:8px;">
      <input id="chat-input" type="text" placeholder="Mande sua zoeira..." style="flex:1; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.04); background:transparent; color:#fff; outline:none">
      <button onclick="enviarMensagemChat()" style="background:var(--accent); color:#071023; padding:10px 14px; border-radius:10px; font-weight:900"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" role="navigation" aria-label="Menu">
    <button class="nav-item" onclick="carregarModulo('login.html', this)"><i class="far fa-user-circle"></i><span>Login</span></button>
    <button class="nav-item" onclick="abrirPalpites(this)"><i class="far fa-edit"></i><span>Palpites</span></button>
    <button class="nav-item" onclick="carregarModulo('galera.html', this)"><i class="fas fa-users"></i><span>Galera</span></button>
    <button class="nav-item" onclick="carregarModulo('estatistica.html', this)"><i class="fas fa-chart-bar"></i><span>Stats</span></button>
    <button class="nav-item" onclick="toggleChat()"><i class="fas fa-comments"></i><span>Chat</span></button>
    <button class="nav-item" onclick="carregarModulo('admin.html', this)"><i class="fas fa-cogs"></i><span>Admin</span></button>
    <button class="nav-item" onclick="limparCentro(this)"><i class="fas fa-file-alt"></i><span>Regra</span></button>
    <button class="nav-item" onclick="sairSistema()"><i class="fas fa-sign-out-alt"></i><span>Sair</span></button>
  </nav>

  <script>
  /* ============================
     Mobile loader + app glue
     ============================ */

  // Globals esperados pelos módulos externos:
  window.chartCravadosInstance = window.chartCravadosInstance || null;
  window.chartTorcidaInstance = window.chartTorcidaInstance || null;
  window.usuarioLogado = window.usuarioLogado || null;

  // Destrói charts globais se existirem (usado antes de re-injetar módulos)
  function destruirChartsGlobais() {
    try { if (window.chartCravadosInstance) { window.chartCravadosInstance.destroy(); window.chartCravadosInstance = null; } } catch(e){}
    try { if (window.chartTorcidaInstance) { window.chartTorcidaInstance.destroy(); window.chartTorcidaInstance = null; } } catch(e){}
  }

  // Mostra o home (ranking) e esconde o container de módulos
  function mostrarHome() {
    const conteudo = document.getElementById('conteudo-central');
    if (conteudo) conteudo.classList.add('hidden');
    const home = document.getElementById('home-containers');
    if (home) home.classList.remove('hidden');
    destruirChartsGlobais();
    atualizarMenuAtivo(null);
    // Atualiza ranking imediatamente
    inicializarRankingFixo();
    // Fecha chat
    document.getElementById('container-chat-fixo')?.classList.remove('aberto');
    // scroll top
    document.getElementById('main-area')?.scrollTo({top:0, behavior:'smooth'});
  }

  // limparCentro é compat com módulos que chamam isso
  window.limparCentro = function() { mostrarHome(); };

  // Atualiza visual do menu ativo
  function atualizarMenuAtivo(el) {
    document.querySelectorAll('.nav-item, .menu-item').forEach(b=>b.classList.remove('active'));
    if (el) el.classList.add('active');
  }
  window.atualizarMenuAtivo = atualizarMenuAtivo;

  // Toggle chat cortina
  function toggleChat() {
    const chat = document.getElementById('container-chat-fixo');
    if (!chat) return;
    chat.classList.toggle('aberto');
  }
  window.toggleChat = toggleChat;

  // Carrega módulos de forma resiliente:
  // - Lida com fragmentos e documentos completos (<html><body>...). 
  // - Injeta scripts (src e inline) com await para scripts externos, e executa inline.
  async function carregarModulo(url, el) {
    try {
      // Se já está ativo, voltar para home
      if (el && el.classList.contains('active')) { mostrarHome(); return; }

      // Destruir charts do módulo anterior
      destruirChartsGlobais();

      // UI: feedback e ativar menu
      atualizarMenuAtivo(el);
      const homeContainers = document.getElementById('home-containers');
      const conteudoCentral = document.getElementById('conteudo-central');
      const container = document.getElementById('modulo-container');

      if(!container || !conteudoCentral || !homeContainers) { console.error("Estrutura mobile faltando."); return; }

      // show loader
      homeContainers.classList.add('hidden');
      conteudoCentral.classList.remove('hidden');
      container.innerHTML = `<div style="padding:30px;text-align:center;color:var(--accent)"><i class="fas fa-spinner fa-spin" style="font-size:26px"></i><div style="margin-top:8px;font-weight:800">Carregando...</div></div>`;
      // fetch
      const res = await fetch(url + '?v=' + new Date().getTime());
      if(!res.ok) throw new Error('Status: ' + res.status);
      const txt = await res.text();

      // Parse via DOMParser para extrair body se houver
      let parsedHtml = txt;
      try {
        const dp = new DOMParser();
        const doc = dp.parseFromString(txt, 'text/html');
        // preferir body.innerHTML se existir
        if (doc && doc.body && doc.body.children.length > 0) {
          parsedHtml = doc.body.innerHTML;
          // Também, se houver <script src="..."> no head do documento, precisamos trazê-los.
          const headScripts = Array.from(doc.querySelectorAll('head script[src]')).map(s => ({src:s.src, attr:Array.from(s.attributes)}));
          // Prepend external head scripts before body scripts; we'll load them after clearing container
        }
      } catch(e) {
        // fallback: usar txt direto
      }

      // Insere HTML
      container.innerHTML = parsedHtml;

      // Reexecutar scripts (external first then inline)
      // 1) External scripts inside container
      const externalScripts = Array.from(container.querySelectorAll('script[src]'));
      for (const s of externalScripts) {
        const newS = document.createElement('script');
        // copy attributes
        Array.from(s.attributes).forEach(a => newS.setAttribute(a.name, a.value));
        // ensure same-origin path stays relative
        await new Promise((resolve, reject) => {
          newS.onload = resolve; newS.onerror = resolve; // resolve even on error to continue
          document.head.appendChild(newS);
        });
        s.remove();
      }
      // 2) Inline scripts
      const inlineScripts = Array.from(container.querySelectorAll('script'));
      inlineScripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
        newScript.text = oldScript.innerHTML;
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });

      // Scroll top of module
      document.getElementById('main-area')?.scrollTo({top:0, behavior:'smooth'});

    } catch (err) {
      console.error("Erro ao carregar módulo:", err);
      const container = document.getElementById('modulo-container');
      if (container) container.innerHTML = `<div class="empty-state">Erro ao carregar conteúdo. Tente novamente.</div>`;
    }
  }
  window.carregarModulo = carregarModulo;

  // abrirPalpites compatível com os módulos
  function abrirPalpites(el) {
    if (!window.usuarioLogado) {
      alert("Acesse sua conta primeiro!");
      const loginBtn = document.querySelector('button[onclick*="login.html"], button[onclick*=\"carregarModulo('login.html'\"]');
      carregarModulo('login.html', loginBtn || null);
      return;
    }
    carregarModulo('palpites.html', el);
  }
  window.abrirPalpites = abrirPalpites;

  // Definir usuário (módulos chamam window.definirUsuario)
  window.definirUsuario = function(usuario) {
    window.usuarioLogado = usuario;
    localStorage.setItem('userLogado', JSON.stringify(usuario));
    const ud = document.getElementById('user-display');
    if(ud) { ud.innerText = usuario.Apelido; ud.style.color = 'var(--accent)'; }
    // ping inicial e atualiza ranking
    enviarPing();
    inicializarRankingFixo();
    mostrarHome();
  };

  // Sair
  function sairSistema() {
    window.usuarioLogado = null;
    localStorage.removeItem('userLogado');
    sessionStorage.clear();
    // redirect to sair.html (keeps previous behavior)
    window.location.href = 'sair.html';
  }
  window.sairSistema = sairSistema;

  // ping para marcar presença
  async function enviarPing() {
    try {
      if (!window.usuarioLogado?.Apelido) return;
      await fetch('/api/ping', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ apelido: window.usuarioLogado.Apelido })});
    } catch(e){ console.error("ping erro", e); }
  }
  window.enviarPing = enviarPing;

  /* ---------------------
     Ranking e Chat logic
     --------------------- */

  async function inicializarRankingFixo() {
    const container = document.getElementById('lista-ranking');
    const lastEl = document.getElementById('ranking-last');
    if (!container) return;
    container.innerHTML = `<div class="empty-state">Carregando ranking...</div>`;
    try {
      const res = await fetch('/api/ranking');
      if(!res.ok) throw new Error('offline');
      const data = await res.json();
      if (!data.success) { container.innerHTML = `<div class="empty-state">Ranking indisponível</div>`; return; }
      // Render simples
      let html = '<div style="display:flex;flex-direction:column;gap:6px">';
      data.ranking.forEach((u, i) => {
        const online = u.Online ? '<span style="color:#34d399;margin-left:6px;font-size:.8rem">●</span>' : '';
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02)">
                   <div style="font-weight:700">${i+1}º ${u.Apelido}${online}</div>
                   <div style="font-weight:900;color:var(--accent)">${u.Total || 0} pts</div>
                 </div>`;
      });
      html += '</div>';
      container.innerHTML = html;
      if (lastEl) lastEl.innerText = new Date().toLocaleTimeString();
    } catch(e) {
      container.innerHTML = `<div class="empty-state">Ranking offline</div>`;
    }
  }
  window.inicializarRankingFixo = inicializarRankingFixo;

  async function inicializarChatFixo() {
    const container = document.getElementById('chat-messages');
    if (!container) return;
    container.innerHTML = `<div class="empty-state">Carregando chat...</div>`;
    try {
      const res = await fetch('/get-chat');
      if(!res.ok) throw new Error('err');
      const data = await res.json();
      if (!data.success) { container.innerHTML = `<div class="empty-state">Sem mensagens</div>`; return; }
      container.innerHTML = data.mensagens.map(m => `
        <div style="background:rgba(255,255,255,0.02); padding:10px; border-radius:10px;">
          <div style="font-size:.75rem;color:var(--accent);font-weight:800">${m.Apelido}</div>
          <div style="font-size:1rem;color:#e6eef8">${m.Mensagem}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    } catch(e) {
      container.innerHTML = `<div class="empty-state">Chat offline</div>`;
    }
  }
  window.inicializarChatFixo = inicializarChatFixo;

  async function enviarMensagemChat() {
    const input = document.getElementById('chat-input');
    if (!input || !input.value.trim() || !window.usuarioLogado) return;
    try {
      await fetch('/enviar-msg', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ apelido: window.usuarioLogado.Apelido, mensagem: input.value })
      });
      input.value = '';
      inicializarChatFixo();
    } catch(e) {
      console.error('Erro enviar msg', e);
    }
  }
  window.enviarMensagemChat = enviarMensagemChat;

  /* ========================
     Boot: inicia estado
     ======================== */
  document.addEventListener('DOMContentLoaded', () => {
    // Restaurar user salvo
    const user = localStorage.getItem('userLogado');
    if (user) {
      try {
        window.usuarioLogado = JSON.parse(user);
        document.getElementById('user-display').innerText = window.usuarioLogado.Apelido;
        document.getElementById('user-display').style.color = 'var(--accent)';
      } catch(e){}
    }

    // Inicia ranking e chat
    inicializarRankingFixo();
    inicializarChatFixo();

    // Pings periódicos (se logado)
    setInterval(() => { if (window.usuarioLogado) enviarPing(); }, 30000);
    setInterval(inicializarRankingFixo, 40000);
    setInterval(inicializarChatFixo, 6000);
  });

  </script>
</body>
</html>
