<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking da Zoeira</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-align: center;
        }
        .ranking-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .ranking-item:hover {
            background: #f9f9f9;
        }
        .ranking-item:last-child {
            border-bottom: none;
        }
        .colocacao {
            font-size: 1.5em;
            font-weight: bold;
            color: #555;
            width: 40px;
            text-align: center;
        }
        .avatar-container {
            width: 60px;
            height: 60px;
            margin: 0 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #1a73e8;
            background-color: #e0e0e0;
        }
        .info {
            flex-grow: 1;
        }
        .apelido {
            font-size: 1.2em;
            font-weight: bold;
            margin: 0;
            color: #222;
        }
        .pontos {
            color: #666;
            margin: 5px 0 0 0;
            font-size: 0.95em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🏆 Segue o Líder e o Fiasco 🏆</h1>

    <div class="ranking-container" id="lista-ranking">
        <p style="text-align: center; padding: 20px;">Carregando os mitos e os bagres...</p>
    </div>

    <script>
        // Caminho relativo: funciona tanto no localhost quanto no Render
        const API_URL = '/api/zoeira';

        async function carregarRanking() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Erro ao buscar dados do servidor');
                
                const dados = await response.json();
                renderizarRanking(dados);
            } catch (error) {
                console.error("Erro:", error);
                document.getElementById('lista-ranking').innerHTML = `<p style="text-align: center; color: red;">Erro ao carregar o ranking da zoeira.</p>`;
            }
        }

        function renderizarRanking(dados) {
            const container = document.getElementById('lista-ranking');
            container.innerHTML = ''; 

            dados.forEach((jogador, index) => {
                const colocacao = index + 1;
                
                // Lógica do Avatar: Puxa da pasta /avt/ (que está dentro de public)
                let avatarHTML = '';
                if (jogador.dAvatar) {
                    // Exemplo: se no banco estiver "mario.png", a URL vira "/avt/mario.png"
                    avatarHTML = `<img src="/avt/${jogador.dAvatar}" alt="Avatar de ${jogador.Apelido}" class="avatar">`;
                }

                const itemHTML = `
                    <div class="ranking-item">
                        <div class="colocacao">${colocacao}º</div>
                        <div class="avatar-container">
                            ${avatarHTML}
                        </div>
                        <div class="info">
                            <p class="apelido">${jogador.Apelido}</p>
                            <p class="pontos">${jogador.TotalPontos} pontos</p>
                        </div>
                    </div>
                `;
                container.innerHTML += itemHTML;
            });
        }

        carregarRanking();
    </script>
</body>
</html>
