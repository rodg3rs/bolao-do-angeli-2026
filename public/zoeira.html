<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking da Zoeira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #ffc107;
            --border: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            width: 100%;
            max-width: 500px;
        }

        /* Container do Avatar para Clipping do Zoom */
        .avatar-container {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            overflow: hidden; /* Corta a imagem quando ela aumenta */
            border: 2px solid var(--accent);
            background-color: var(--bg);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Efeito de Zoom na Imagem */
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease-in-out;
        }

        .avatar-container:hover .avatar-img {
            transform: scale(1.6); /* Aumenta 60% ao passar o mouse */
        }

        .list-scroll {
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }
    </style>
</head>
<body class="antialiased">

    <section class="card-panel p-5 flex flex-col shadow-2xl">
        <div class="flex items-center gap-3 mb-4 border-b border-[var(--border)] pb-3">
            <i class="fas fa-trophy text-[var(--accent)] text-sm"></i>
            <h2 class="text-sm font-bold tracking-tight uppercase text-[var(--accent)]">
                Segue o Líder e o Fiasco
            </h2>
        </div>

        <div id="lista-ranking-zoeira" class="list-scroll space-y-1 pr-1">
            <div class="text-center text-sm text-[var(--text-secondary)] py-10 opacity-50">
                Carregando os mitos...
            </div>
        </div>
    </section>

    <script>
        async function carregarRankingZoeira() {
            try {
                // Chama a rota que faz o JOIN entre dLogin e dAvatar
                const res = await fetch('/api/zoeira');
                const data = await res.json();
                
                if(data && Array.isArray(data)) {
                    let html = '';
                    data.forEach((user, index) => {
                        
                        // Busca o nome do arquivo na coluna 'arquivo_imagem' (vinda do campo Imagem da dAvatar)
                        // Caminho padrão na sua pasta /avt/
                        const imgPath = user.arquivo_imagem 
                            ? `/avt/${user.arquivo_imagem}` 
                            : `/avt/default.png`;

                        html += `
                        <div class="flex justify-between items-center py-2 px-2 hover:bg-white/5 transition-colors border-b border-white/5 last:border-none">
                            <div class="flex items-center gap-4">
                                <span class="text-xs font-bold opacity-30 w-6 text-center">${index + 1}º</span>
                                
                                <div class="avatar-container shadow-lg">
                                    <img src="${imgPath}" 
                                         class="avatar-img" 
                                         alt="${user.Apelido}"
                                         onerror="this.src='/avt/default.png'">
                                </div>

                                <span class="text-sm font-medium text-[var(--text-primary)]">
                                    ${user.Apelido}
                                </span>
                            </div>
                            
                            <div class="text-right">
                                <b class="text-[var(--accent)] text-sm">${user.TotalPontos || 0}</b>
                                <span class="text-[10px] text-[var(--text-secondary)] uppercase ml-1">pts</span>
                            </div>
                        </div>`;
                    });
                    
                    document.getElementById('lista-ranking-zoeira').innerHTML = html;
                }
            } catch(e) { 
                console.error("Erro no ranking zoeira:", e);
                document.getElementById('lista-ranking-zoeira').innerHTML = 
                    `<div class="text-center text-red-500 text-xs py-4">Erro ao sincronizar dados</div>`;
            }
        }

        // Inicialização automática
        document.addEventListener('DOMContentLoaded', () => {
            carregarRankingZoeira();
            // Atualiza a cada 20 segundos para manter o ranking vivo
            setInterval(carregarRankingZoeira, 20000);
        });
    </script>
</body>
</html>
