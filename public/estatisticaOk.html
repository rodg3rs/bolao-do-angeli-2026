<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statis - Bolão 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
        canvas { max-height: 400px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">


    <main class="max-w-5xl mx-auto px-4">
        
        <div class="flex gap-8 mb-6 border-b border-gray-200 justify-center md:justify-start">
            <button onclick="switchTab('cravados')" id="btn-cravados" class="tab-active py-2 px-4 font-bold transition">
                <i class="fas fa-bullseye mr-2"></i>Cravados
            </button>
            <button onclick="switchTab('torcida')" id="btn-torcida" class="py-2 px-4 font-bold text-gray-500 hover:text-indigo-600 transition">
                <i class="fas fa-flag mr-2"></i>Torcida
            </button>
	    <a href="index.html" class="ml-auto py-2 px-4 font-bold text-red-500 hover:text-red-700 transition flex items-center">
            	<i class="fas fa-undo-alt mr-2"></i>Voltar
            </a>

        </div>

        <section id="sec-cravados" class="block animate-fade-in">
            <div class="p-6 rounded-2xl border border-gray-100">
		<h2 class="font-bold mb-4" style="color: white;">Ranking de Precisão</h2>
	  	    <div style="position: relative; height: 350px; width: 100%;">                    <canvas id="chartCravados"></canvas>
                </div>
            </div>
        </section>

        <section id="sec-torcida" class="hidden animate-fade-in">
            <div class="p-6 rounded-2xl border border-gray-100">
                <h2 class="font-bold mb-4" style="color: white;">Pontuação Total Acumulada por Time</h2>
                <div class="relative h-[400px]">
                    <canvas id="chartTorcida"></canvas>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Configurações Globais dos Gráficos
	window.chartCravadosInstance = window.chartCravadosInstance || null;
	window.chartTorcidaInstance = window.chartTorcidaInstance || null;

        // Função para alternar entre as abas visualmente
        function switchTab(tab) {
            const secCravados = document.getElementById('sec-cravados');
            const secTorcida = document.getElementById('sec-torcida');
            const btnCravados = document.getElementById('btn-cravados');
            const btnTorcida = document.getElementById('btn-torcida');

            if (tab === 'cravados') {
                secCravados.classList.remove('hidden');
                secTorcida.classList.add('hidden');
                btnCravados.classList.add('tab-active');
                btnTorcida.classList.remove('tab-active');
                btnTorcida.classList.add('text-gray-500');
            } else {
                secTorcida.classList.remove('hidden');
                secCravados.classList.add('hidden');
                btnTorcida.classList.add('tab-active');
                btnCravados.classList.remove('tab-active');
                btnCravados.classList.add('text-gray-500');
            }
        }

        // Função Principal de Busca de Dados (API)
        async function fetchData() {
            try {
                // Rota que você deve criar no seu server.js
                const response = await fetch('/api/estatisticas');
                const data = await response.json();
		setTimeout(() => {
                    renderCravados(data.cravados);
                    renderTorcida(data.torcida);
		}, 100);
            } catch (error) {
                console.error("Erro ao carregar estatísticas:", error);
                // Caso queira testar sem o servidor rodando, você pode injetar dados falsos aqui
            }
        }

        function renderCravados(lista) {
            const ctx = document.getElementById('chartCravados').getContext('2d');
            if (window.chartCravadosInstance) window.chartCravadosInstance.destroy();

            window.chartCravadosInstance = new Chart(ctx, {
                type: 'bar',
                data: {
		    labels: lista.map(u => u.Apelido),
            	    datasets: [
                	{
                    	    label: 'Placar Exato (Cravado)',
                    	    data: lista.map(u => u.cravados),
                    	    backgroundColor: 'rgba(255, 193, 7, 0.8)', // Amarelo/Ouro
                    	    borderRadius: 5
                	},
                	{
                    	    label: 'Acerto Simples (Vencedor/Empate)',
                    	    data: lista.map(u => u.acertos_comuns),
                    	    backgroundColor: 'rgba(79, 70, 229, 0.6)', // Roxo/Indigo
                    	    borderRadius: 5
                	}
            	]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { 
                    stacked: true, // Empilha as barras para mostrar o total de acertos
                    beginAtZero: true, 
                    ticks: { color: '#FFD700', stepSize: 1 } 
                },
                x: { 
                    stacked: true, // Empilha as barras
                    ticks: { color: '#FFD700' } 
                }
            },
            plugins: {
                legend: {
                    display: true,
                    labels: { color: '#FFD700' }
                },
                tooltip: {
                    mode: 'index',
                    intersect: false
                }
            }
        }
    });
}

function renderTorcida(lista) {
    const ctx = document.getElementById('chartTorcida').getContext('2d');

    if (chartTorcidaInstance) chartTorcidaInstance.destroy();

    chartTorcidaInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: lista.map(t => t.Time),
            datasets: [{
                label: 'Pontos Acumulados',
                data: lista.map(t => t.pontos),
                backgroundColor: 'rgba(16, 185, 129, 0.7)',
                borderColor: '#10b981',
                borderWidth: 2,
                borderRadius: 5
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false, // Adicionada a vírgula aqui
            plugins: {
                legend: {
                    display: false 
                }
            }, // Adicionada a vírgula aqui
            scales: {
                x: { ticks: { color: '#FFD700' } },
                y: { ticks: { color: '#FFD700' } }
            }
        }
    });
}

        // Iniciar carregamento
        fetchData();
    </script>
</body>
</html>
