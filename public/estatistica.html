<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statis - Bolão do Angeli - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; }
        .tab-active { border-bottom: 3px solid #FFD700; color: #FFD700; }
        .chart-container::-webkit-scrollbar { width: 8px; }
        .chart-container::-webkit-scrollbar-track { background: #1e293b; }
        .chart-container::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen font-sans">

    <main class="max-w-full w-full px-4 py-2 mt-0 content-start justify-start text-left items-start">
        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
            <button onclick="switchTab('cravados')" id="btn-cravados" class="tab-active py-2 px-4 font-bold transition">
                <i class="fas fa-bullseye mr-2"></i>Cravados
            </button>
            <button onclick="switchTab('torcida')" id="btn-torcida" class="py-2 px-4 font-bold text-gray-500 hover:text-yellow-500 transition">
                <i class="fas fa-flag mr-2"></i>Torcida
            </button>
            <a href="javascript:void(0)" class="ml-auto py-2 px-4 font-bold text-red-500 hover:text-red-400 transition flex items-center" onclick="if (typeof limparCentro === 'function') { limparCentro(); } else { history.back(); }"> 
                <i class="fas fa-undo-alt mr-2"></i>Voltar </a>
        </div>

        <section id="sec-cravados" class="block">
            <div class="p-6 rounded-2xl bg-slate-800/50 border border-slate-700">
                <h2 class="font-bold mb-4 text-yellow-500 text-xl">Ranking de Precisão</h2>
                <div class="chart-container" style="position: relative; height: 500px; overflow-y: auto;">
                    <div id="chart-wrapper" style="min-height: 400px; width: 100%;"> 
                        <canvas id="chartCravados"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-torcida" class="hidden">
            <div class="p-6 rounded-2xl bg-slate-800/50 border border-slate-700">
                <h2 class="font-bold mb-4 text-yellow-500 text-xl">Pontuação Total por Time</h2>
                <div class="relative h-[400px]">
                    <canvas id="chartTorcida"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Registra o plugin de rótulos caso ele já não esteja ativo
        if (typeof ChartDataLabels !== 'undefined') {
            if (!Chart.registry.plugins.get('datalabels')) {
                Chart.register(ChartDataLabels);
            }
        } else {
            console.error("Erro: O plugin ChartDataLabels não foi carregado!");
        }

        // Força a destruição de instâncias remanescentes na memória global do objeto window
        if (window.chartCravadosInstance) {
            window.chartCravadosInstance.destroy();
            window.chartCravadosInstance = null;
        }
        if (window.chartTorcidaInstance) {
            window.chartTorcidaInstance.destroy();
            window.chartTorcidaInstance = null;
        }

        function switchTab(tab) {
            document.getElementById('sec-cravados').classList.toggle('hidden', tab !== 'cravados');
            document.getElementById('sec-torcida').classList.toggle('hidden', tab !== 'torcida');
            document.getElementById('btn-cravados').className = tab === 'cravados' ? 'tab-active py-2 px-4 font-bold transition' : 'py-2 px-4 font-bold text-gray-500 hover:text-yellow-500 transition';
            document.getElementById('btn-torcida').className = tab === 'torcida' ? 'tab-active py-2 px-4 font-bold transition' : 'py-2 px-4 font-bold text-gray-500 hover:text-yellow-500 transition';
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/estatisticas');
                const data = await response.json();
                
                if (data.cravados && data.cravados.length > 0) {
                    // Ajuste dinâmico de altura de segurança por utilizador
                    const novaAltura = Math.max(400, data.cravados.length * 40);
                    const wrapper = document.getElementById('chart-wrapper');
                    if (wrapper) wrapper.style.height = novaAltura + 'px';
                    renderCravados(data.cravados);
                }
                
                if (data.torcida) {
                    renderTorcida(data.torcida);
                }
            } catch (error) {
                console.error("Erro ao carregar:", error);
            }
        }

        function renderCravados(lista) {
            const canvas = document.getElementById('chartCravados');
            if (!canvas) {
                console.warn("Aguardando o elemento #chartCravados aparecer no DOM...");
                return; 
            }
            const ctx = canvas.getContext('2d');
            
            // Destrói de forma definitiva se houver referência ativa anexada à janela
            if (window.chartCravadosInstance) window.chartCravadosInstance.destroy();

            window.chartCravadosInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: lista.map(u => u.Apelido),
                    datasets: [
                        { label: '25 pts', data: lista.map(u => u.acertos_25 || 0), backgroundColor: '#FFD700' }, 
                        { label: '18 pts', data: lista.map(u => u.acertos_18 || 0), backgroundColor: '#DAA520' }, 
                        { label: '15 pts', data: lista.map(u => u.acertos_15 || 0), backgroundColor: '#F0E68C' }, 
                        { label: '12 pts', data: lista.map(u => u.acertos_12 || 0), backgroundColor: '#B8860B' }, 
                        { label: '10 pts', data: lista.map(u => u.acertos_10 || 0), backgroundColor: '#8B4513' }  
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { stacked: true, grid: { color: '#334155' }, ticks: { color: '#FFD700' } },
                        y: { stacked: true, grid: { display: false }, ticks: { color: '#FFD700', font: { weight: 'bold' } } }
                    },
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#FFD700' } },
                        datalabels: {
                            color: '#000',
                            anchor: 'center',
                            align: 'center',
                            font: { weight: 'bold' },
                            formatter: (value) => value > 0 ? value : ''
                        }
                    }
                }
            });
        }

        function renderTorcida(lista) {
            const canvas = document.getElementById('chartTorcida');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (window.chartTorcidaInstance) window.chartTorcidaInstance.destroy();
            
            window.chartTorcidaInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: lista.map(t => t.Time),
                    datasets: [{
                        label: 'Pontos',
                        data: lista.map(t => t.pontos),
                        backgroundColor: '#10b981'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#FFD700' } },
                        y: { ticks: { color: '#FFD700' } }
                    }
                }
            });
        }

        // Timeout limpo para garantir a injeção correta no DOM modular
        setTimeout(() => {
            fetchData();
        }, 50);
    </script>
</body>
</html>
