<div id="painel-galera" class="painel-central-container w-full h-full flex flex-col p-6 overflow-hidden">
    <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-4">
        <h2 class="text-[var(--accent)] font-bold uppercase tracking-wider">
            <i class="fas fa-users mr-2"></i> Palpites da Galera
        </h2>
        <div class="flex gap-3">
	<select id="filtroJogo" 
        	class="bg-slate-800 border border-slate-600 text-white text-sm rounded-lg p-2 outline-none focus:border-[var(--accent)]" 
        	onchange="filtrarGalera()">
    		<option value="">Todos os Jogos</option>
 	   </select>
            <input type="text" id="filtroApelido" 
                   class="bg-slate-800 border border-slate-600 text-white text-sm rounded-lg p-2 outline-none focus:border-[var(--accent)]" 
                   placeholder="Buscar apelido..." onkeyup="filtrarGalera()">
            
            <button onclick="fecharModuloGalera()" 
                    class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all">
                <i class="fas fa-times mr-1"></i> Sair
            </button>
        </div>
    </div>

    <div class="flex-grow overflow-y-auto pr-2 custom-scroll">
        <table class="w-full text-left border-collapse">
            <thead class="sticky top-0 bg-slate-900 shadow-md">
                <tr class="text-[var(--text-secondary)] text-xs uppercase border-b border-slate-700">
                    <th class="py-3 px-2">Usuário</th>
                    <th class="py-3 px-2 text-center">Jogo</th>
                    <th class="py-3 px-2 text-center">Palpite</th>
                    <th class="py-3 px-2 text-center">Placar</th>
                    <th class="py-3 px-2 text-center">Pts</th>
                </tr>
            </thead>
            <tbody id="corpoTabelaGalera" class="text-sm">
                </tbody>
        </table>
        <div id="loading-galera" class="text-center py-10 text-slate-500 italic">
            Carregando palpites permitidos...
        </div>
    </div>
</div>

<script>
    // 1. Bloqueia navegação externa enquanto estiver na Galera
    document.querySelectorAll('.menu-item').forEach(btn => {
        if (!btn.innerText.includes('Galera')) btn.style.pointerEvents = 'none';
    });

    async function carregarDadosGalera() {
        try {
            // Chamada para sua API que lê a tabela dApostas
            const response = await fetch('/api/palpites-galera'); 
            const data = await response.json();
            const selectJogo = document.getElementById('filtroJogo');
	    const jogosUnicos = [...new Set(data.palpites.map(p => p.Jogo))].sort();

            if (!data.success) throw new Error(data.message);

	    selectJogo.innerHTML = '<option value="">Todos os Jogos</option>';
		jogosUnicos.forEach(jogo => {
 		   selectJogo.innerHTML += `<option value="${jogo}">${jogo}</option>`;
	    });

            const tbody = document.getElementById('corpoTabelaGalera');
            const loading = document.getElementById('loading-galera');
            tbody.innerHTML = '';
            
            const agora = new Date();

            data.palpites.forEach(p => {
                // Converte Data (AAAA-MM-DD) e Horario (HH:MM) para objeto Date para comparação
                const dataJogo = new Date(`${p.Data}T${p.Horario}`);
                
                // CONDIÇÃO: Só mostra se o jogo já começou ou terminou
                if (dataJogo <= agora || p.Res1 !== null) {
                    const row = `
                        <tr class="border-b border-slate-800 hover:bg-white/5 transition-colors">
                            <td class="py-3 px-2 font-medium text-[var(--accent)]">${p.Apelido}</td>
                            <td class="py-3 px-2 text-center text-xs text-white">${p.Jogo}</td>
                            <td class="py-3 px-2 text-center font-bold">
                                ${p.Sel1} ${p.Ap1} x ${p.Ap2} ${p.Sel2}
                            </td>
                            <td class="py-3 px-2 text-center text-white">
                                ${p.Res1 !== null ? p.Res1 + ' x ' + p.Res2 : 'Em andamento'}
                            </td>
                            <td class="py-3 px-2 text-center">
                                <span class="bg-yellow-900/20 text-yellow-400 border border-yellow-700/50 px-2 py-1 rounded text-xs font-bold">${p.Pontos}</span>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            });

            loading.classList.add('hidden');
            if (tbody.innerHTML === '') {
                loading.innerText = 'Nenhum jogo disponível para consulta ainda.';
                loading.classList.remove('hidden');
            }

        } catch (err) {
            console.error("Erro ao carregar:", err);
            document.getElementById('loading-galera').innerText = "Erro ao carregar dados.";
        }
    }

function filtrarGalera() {
    const termoApelido = document.getElementById("filtroApelido").value.toUpperCase();
    const termoJogo = document.getElementById("filtroJogo").value;
    const linhas = document.querySelectorAll("#corpoTabelaGalera tr");

    linhas.forEach(linha => {
        const apelidoTxt = linha.cells[0].textContent.toUpperCase();
        const jogoTxt = linha.cells[1].textContent; // Coluna do Jogo

        const bateApelido = apelidoTxt.includes(termoApelido);
        const bateJogo = termoJogo === "" || jogoTxt === termoJogo;

        // A linha só aparece se atender aos dois filtros simultaneamente
        linha.style.display = (bateApelido && bateJogo) ? "" : "none";
    });
}

    function fecharModuloGalera() {
        // Libera navegação
        document.querySelectorAll('.menu-item').forEach(btn => btn.style.pointerEvents = 'auto');
        
        // Limpa centro e volta background
        const centro = document.getElementById('conteudo-central');
        centro.innerHTML = '';
        centro.style.backgroundImage = "url('/img/copa2026.png')";
    }

    // Inicializa a carga
    carregarDadosGalera();
</script>
